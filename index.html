<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>FrancFarm Deluxe — Francis Le Coq</title>
  <meta name="theme-color" content="#0b1027" />
  <meta name="description" content="FrancFarm Deluxe — le city-builder agricole de Francis Le Coq pour Telegram et GitHub Pages." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <canvas id="gameCanvas" aria-label="Carte de la ferme de Francis" role="img"></canvas>

    <header class="hud hud--top">
      <div class="brand">
        <img src="assets/icon.svg" alt="Francis" class="brand__icon" />
        <div>
          <strong>FrancFarm Deluxe</strong>
          <span id="seasonLabel">Aube dans le poulailler</span>
        </div>
      </div>
      <div class="resources">
        <div class="pill" title="Francs"><span>🪙</span><b id="coins">0</b></div>
        <div class="pill" title="Niveau"><span>⭐</span><b id="level">1</b></div>
        <button id="holderBtn" class="holder-btn" type="button" title="Activer le mode holder">🔒 Holder</button>
      </div>
    </header>

    <aside class="toolbar" aria-label="Outils de ferme">
      <button class="tool is-active" data-tool="inspect" type="button"><span>👆</span><small>Jouer</small></button>
      <button class="tool" data-tool="plow" type="button"><span>🚜</span><small>Labourer</small></button>
      <button class="tool" data-tool="plant" type="button"><span>🌱</span><small>Planter</small></button>
      <button class="tool" data-tool="build" type="button"><span>🏗️</span><small>Bâtir</small></button>
      <button class="tool" data-tool="road" type="button"><span>🧱</span><small>Route</small></button>
    </aside>

    <section class="objective-card" id="objectiveCard" aria-live="polite">
      <div class="objective-card__head">
        <span id="objectiveIcon">📜</span>
        <strong id="objectiveTitle">Objectif</strong>
      </div>
      <p id="objectiveText">Prépare la ferme.</p>
      <div class="progress"><span id="objectiveProgress"></span></div>
    </section>

    <section class="selection" id="selectionPanel" aria-live="polite">
      <strong id="selectionTitle">Francis attend ton ordre</strong>
      <p id="selectionText">Touche une case pour jouer.</p>
      <button id="selectionAction" type="button" hidden>Action</button>
    </section>

    <nav class="hud hud--bottom" aria-label="Menus principaux">
      <button data-panel="crops" type="button"><span>🌾</span>Cultures</button>
      <button data-panel="buildings" type="button"><span>🏠</span>Bâtiments</button>
      <button data-panel="orders" type="button"><span>📦</span>Commandes</button>
      <button data-panel="inventory" type="button"><span>🎒</span>Stock</button>
      <button data-action="harvestAll" type="button"><span>✨</span>Récolter</button>
    </nav>

    <div class="sheet" id="sheet" aria-hidden="true">
      <div class="sheet__card" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
        <div class="sheet__handle"></div>
        <div class="sheet__head">
          <h2 id="sheetTitle">Menu</h2>
          <button id="sheetClose" type="button" aria-label="Fermer">✕</button>
        </div>
        <div id="sheetBody" class="sheet__body"></div>
      </div>
    </div>

    <div class="toast-stack" id="toasts" aria-live="polite"></div>

    <div class="intro" id="intro">
      <img src="assets/francis.svg" alt="Francis Le Coq" />
      <div class="intro__bubble">
        <h1>Bienvenue dans le poulailler.</h1>
        <p>Francis veut bâtir une ferme isométrique, produire, livrer et transformer $FRANC en véritable univers de jeu.</p>
        <button id="startGame" type="button">Lancer la partie 🐓</button>
      </div>
    </div>
  </div>

  <script src="src/config.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
