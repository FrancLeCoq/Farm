<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>FrancFarm — La ferme du Coq Francis 🐓</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0a0818;--border:rgba(130,80,255,.25);--glass:rgba(255,255,255,.06);--accent:#f0c040;--purple-accent:#9b59b6;--green:#44cc66;--blue:#4a90d9;--pink:#e84393;--purple:#8b5cf6;--orange:#f97316;--red:#e74c3c;--text:#f0f0f5;--dim:#8899bb}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);touch-action:none}
#game{position:relative;width:100%;height:100%;max-width:600px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}

/* canvas scene */
#cv{flex:1;display:block;width:100%;height:100%;background:linear-gradient(180deg,#16213e 0%,#1a2744 40%,#24502f 100%)}

/* ═══ TOP BAR — repris du Tamagotchi ═══ */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(10,20,40,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,140,220,.12);z-index:20;position:absolute;top:0;left:0;right:0}
.tb-clock{font-size:14px;font-weight:800;color:var(--accent);font-family:'Courier New',monospace;background:rgba(240,192,64,.08);padding:4px 10px;border-radius:16px;border:1px solid rgba(240,192,64,.15)}
.tb-envelope{background:none;border:none;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;transition:filter .3s}
.tb-envelope.envelope-blink{animation:envBlink 1s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(255,200,40,1)) saturate(1.6) brightness(1.15)}
@keyframes envBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.15)}}
.tb-avatar{display:flex;align-items:center;gap:6px}
.tb-avatar-ring-wrap{position:relative;width:46px;height:46px;flex-shrink:0}
.tb-ring-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(240,192,64,.18);stroke-width:3}
.ring-fill{fill:none;stroke:#9b59b6;stroke-width:3;stroke-linecap:round;stroke-dasharray:132;stroke-dashoffset:132;transition:stroke-dashoffset .8s ease}
.tb-avatar-img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;object-fit:contain;border-radius:50%;background:rgba(240,192,64,.08);padding:2px}
.tb-level{font-size:14px;font-weight:800;color:var(--accent);text-align:center}
.tb-lock{display:flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;border:2px solid transparent;border-radius:10px;cursor:pointer;font-size:17px;line-height:1;transition:all .2s;background:none}
.tb-lock.holder-disconnected{background:linear-gradient(135deg,rgba(217,119,6,.30),rgba(180,90,0,.22));border-color:rgba(230,150,40,.7);box-shadow:0 0 12px rgba(220,140,20,.35)}
.tb-lock.holder-connected{background:linear-gradient(135deg,rgba(34,197,94,.30),rgba(15,120,60,.22));border-color:rgba(163,230,53,.75);box-shadow:0 0 14px rgba(70,200,110,.5)}
.tb-lock:active{transform:scale(.92)}
.tb-right{display:flex;align-items:center;gap:6px}
.tb-coins{font-size:13px;font-weight:800;color:var(--accent);background:rgba(240,192,64,.08);padding:4px 10px;border-radius:16px;border:1px solid rgba(240,192,64,.15);white-space:nowrap}

/* mode hint */
#modehint{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:15;display:none;background:rgba(10,20,40,.85);color:var(--accent);padding:6px 14px;border-radius:18px;font-size:12px;font-weight:700;border:1px solid rgba(240,192,64,.3);white-space:nowrap}

/* tools (left) */
#tools{position:absolute;left:8px;top:74px;z-index:15;display:flex;flex-direction:column;gap:6px}
.tool{width:46px;height:46px;border-radius:12px;border:1px solid rgba(100,140,220,.2);background:rgba(10,20,40,.55);backdrop-filter:blur(8px);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.tool:active{transform:scale(.92)}
.tool.on{background:linear-gradient(135deg,var(--accent),#e8a020);border-color:var(--accent);box-shadow:0 0 12px rgba(240,192,64,.4)}

/* bottom nav */
#bottom{position:absolute;bottom:0;left:0;right:0;z-index:20;display:flex;gap:7px;padding:9px 9px calc(9px + env(safe-area-inset-bottom,0px));background:rgba(10,20,40,.55);backdrop-filter:blur(12px);border-top:1px solid rgba(100,140,220,.12)}
.navbtn{flex:1;background:var(--glass);border:1px solid rgba(100,140,220,.18);border-radius:14px;padding:8px 2px;font-weight:700;font-size:12px;cursor:pointer;text-align:center;color:var(--text)}
.navbtn:active{transform:translateY(2px)}
.navbtn .ic{display:block;font-size:21px;margin-bottom:1px}

/* toast */
#toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toastmsg{background:rgba(10,20,40,.92);color:var(--text);padding:9px 16px;border-radius:50px;font-weight:700;font-size:13px;border:1px solid rgba(240,192,64,.4);animation:tr 1.8s forwards;text-align:center;max-width:84vw}
@keyframes tr{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}82%{opacity:1}100%{opacity:0;transform:translateY(-12px)}}

/* sheet */
#sheet{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center}
#sheet.show{display:flex}
.sheet-card{width:100%;max-width:600px;max-height:76%;background:#12102a;border-radius:22px 22px 0 0;border-top:1px solid rgba(130,80,255,.3);display:flex;flex-direction:column;animation:su .25s}
@keyframes su{from{transform:translateY(40px)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(130,80,255,.2)}
.sheet-head h2{font-size:18px;font-weight:800;color:var(--accent)}
.closeX{background:rgba(231,76,60,.2);color:var(--red);border:1px solid rgba(231,76,60,.4);border-radius:50%;width:30px;height:30px;font-weight:700;cursor:pointer}
#sheet-body{padding:12px;overflow:auto}
.shop-item{display:flex;align-items:center;gap:11px;background:var(--glass);border:1px solid rgba(100,140,220,.15);border-radius:14px;padding:10px;margin-bottom:9px}
.shop-item .emoji{font-size:26px}
.shop-item .info{flex:1;min-width:0}
.iname{font-weight:700;font-size:14px;color:var(--text)}.idesc{font-size:11px;color:var(--dim);line-height:1.3}
.buy{background:linear-gradient(135deg,var(--green),#2da84e);color:#08240f;border:none;border-radius:10px;padding:9px 13px;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap}
.buy.lock{background:rgba(240,192,64,.18);color:var(--accent);border:1px solid rgba(240,192,64,.4)}
.hint{text-align:center;font-size:13px;color:var(--dim);margin:8px 0 14px;line-height:1.5}
.bigbtn{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:800;color:#08240f;background:linear-gradient(135deg,var(--green),#2da84e);cursor:pointer;margin-bottom:10px}
.bigbtn.gold{background:linear-gradient(135deg,var(--accent),#e8a020);color:#1a1a2e}
.mail-item{background:var(--glass);border:1px solid rgba(100,140,220,.15);border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.4}
.mail-item.unread{border-color:rgba(240,192,64,.5);background:rgba(240,192,64,.06)}

/* holder modal */
#holdermodal{position:absolute;inset:0;z-index:70;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:22px}
#holdermodal.show{display:flex}
.holder-card{background:#16132f;border:1px solid rgba(240,192,64,.5);border-radius:22px;max-width:340px;text-align:center;padding:0 0 18px;overflow:hidden;box-shadow:0 0 40px rgba(240,192,64,.2)}
.holder-card .hh{background:linear-gradient(135deg,var(--accent),#e8a020);color:#1a1a2e;padding:14px;font-size:18px;font-weight:800}
.holder-card img{width:96px;margin:16px auto 6px;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
.holder-card p{padding:0 20px;font-size:13px;line-height:1.5;margin-bottom:14px;color:var(--text)}
.holder-card b{color:var(--accent)}
.holder-btns{display:flex;gap:8px;padding:0 18px}
.holder-btns button{flex:1;padding:11px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px}
.hb-close{background:rgba(255,255,255,.1);color:var(--dim)}.hb-go{background:linear-gradient(135deg,var(--green),#2da84e);color:#08240f}
</style>
</head>

<script>/* ============================================================
   FrancFarm v3 — Moteur. Charte & modèle temps repris du
   Tamagotchi de Benoît (offline progress via derniereUpdate).
   Assets : EggClicker + Tamagotchi (créations Benoît).
   ============================================================ */
'use strict';
const TG=window.Telegram?.WebApp;
const A=window.FF_ASSETS||{};
const SAVE='francfarm_v3';

const TW=128,TH=64;                 // iso tile
const PRICE={plow:8,fence:10,land:30};
const SEED={wheat:4,corn:10,tomato:20,carrot:32};
const CROP={
  wheat:{name:'Blé',time:30,sell:11,c:'#e2c45a'},     // time in SECONDS of game
  corn:{name:'Maïs',time:90,sell:30,c:'#f0ce46'},
  tomato:{name:'Tomates',time:180,sell:62,c:'#d04034'},
  carrot:{name:'Carottes',time:300,sell:108,c:'#e88c34'},
};
// Buildings (EggClicker sprites). Produce a resource over time -> auto-sell value.
const BUILD={
  coop:   {name:'Poulailler', sprite:'coop',   cost:150,  rate:6,  per:'min', out:'🥚', desc:'Produit des œufs en continu.'},
  farm:   {name:'Ferme',      sprite:'farm',   cost:500,  rate:22, per:'min', out:'🌾', desc:'Récolte automatique de céréales.'},
  factory:{name:'Usine',      sprite:'factory',cost:1500, rate:75, per:'min', out:'📦', desc:'Transforme la production en biens.'},
  lab:    {name:'Labo',       sprite:'lab',    cost:5000, rate:260,per:'min', out:'⚗️', desc:'Recherche : gros rendement.', premium:true},
  station:{name:'Station',    sprite:'station',cost:14000,rate:900,per:'min', out:'🛰️', desc:'Production industrielle.', premium:true},
};
// Equipment: one-time buys that boost things (tractors etc.)
const EQUIP={
  tracteur:  {name:'Tracteur',       icon:'🚜', cost:400,  desc:'Laboure gratuitement.', effect:'freePlow'},
  remorque:  {name:'Remorque',       icon:'🛒', cost:700,  desc:'+15% ventes de récoltes.', effect:'sell15'},
  moissonneuse:{name:'Moissonneuse', icon:'🌾', cost:2200, desc:'Récolte tout en un clic + auto-récolte hors-ligne.', effect:'autoharvest'},
  arroseur:  {name:'Arroseur',       icon:'💧', cost:1200, desc:'Cultures poussent 20% plus vite.', effect:'fastgrow'},
};

function detectHolder(){
  const u=new URLSearchParams(location.search);
  if(u.get('holder')==='1') return true;
  try{return localStorage.getItem('franc_holder')==='1';}catch(e){return false;}
}
let HOLDER=detectHolder();

/* ============================================================
   STATE
   ============================================================ */
let S;
function fresh(){
  const now=Date.now();
  const st={
    coins:120, xp:0, level:1,
    size:6,
    owned:{}, ground:{}, crop:{}, fences:{},
    buildings:[],     // {type, at}
    equip:{},         // effect -> true
    inv:{},
    mail:[],          // {id, txt, read}
    derniereUpdate:now,   // <-- Tamagotchi-style timestamp
    startReal:now,
    gameStartHour:7,      // in-game clock starts 07:00 like tama
    cam:{x:0,y:0,s:1},
    seen:false,
  };
  // OFFER a free 6x6 of grass, fully owned
  for(let x=0;x<6;x++)for(let y=0;y<6;y++){ st.owned[K(x,y)]=true; st.ground[K(x,y)]='grass'; }
  return st;
}

const K=(x,y)=>x+','+y;
const FK=(x,y,e)=>x+','+y+','+e;
function inGrid(x,y){return x>=0&&y>=0&&x<S.size&&y<S.size;}
function owned(x,y){return !!S.owned[K(x,y)];}
function inv(k){return S.inv[k]||0;}
function addInv(k,n){S.inv[k]=(S.inv[k]||0)+n;}
function addCoins(n){S.coins+=n;}

function save(){try{localStorage.setItem(SAVE,JSON.stringify(S));}catch(e){}}
function load(){try{const r=localStorage.getItem(SAVE);if(r){S=JSON.parse(r);return true;}}catch(e){}return false;}

/* ---- iso math ---- */
function isoToScreen(x,y){return{x:(x-y)*(TW/2),y:(x+y)*(TH/2)};}
function screenToIso(sx,sy){const x=(sx/(TW/2)+sy/(TH/2))/2,y=(sy/(TH/2)-sx/(TW/2))/2;return{x:Math.floor(x),y:Math.floor(y)};}

/* ============================================================
   OFFLINE PROGRESS — modèle Tamagotchi
   Au démarrage : calcule le temps écoulé depuis derniereUpdate,
   fait pousser les cultures, produit via bâtiments, puis reset.
   ============================================================ */
const OFFLINE_CAP_H=24;   // catch-up plafonné à 24h
function applyElapsed(){
  const now=Date.now();
  let sec=(now-(S.derniereUpdate||now))/1000;
  if(sec<0) sec=0;
  let capped=Math.min(sec, OFFLINE_CAP_H*3600);
  let earned=0, eggs=0;
  // 1) Buildings produce while away
  for(const b of S.buildings){
    const def=BUILD[b.type];
    const perSec=def.rate/60;
    const gain=Math.floor(perSec*capped);
    earned+=gain;
  }
  if(earned>0) addCoins(earned);
  // 2) Crops: they grow in real-time via timestamps, so just check ripeness on resume.
  //    If moissonneuse (autoharvest) -> auto-collect ripe crops while away.
  let auto=0;
  if(S.equip.autoharvest){
    for(const key in S.crop){
      const c=S.crop[key]; const cr=CROP[c.key];
      const dur=cr.time*growMul();
      if((now-c.at)/1000>=dur){ addCoins(sellPrice(cr.sell)); auto++; delete S.crop[key]; }
    }
  }
  S.derniereUpdate=now;
  return {sec:capped, earned, auto};
}

/* ---- effects ---- */
function growMul(){return S.equip.fastgrow?0.8:1;}
function sellPrice(base){return Math.floor(base*(S.equip.sell15?1.15:1));}

/* ============================================================
   PASTURE (flood fill) — gardé pour clôtures/pâtures
   ============================================================ */
let ENCLOSED={};
function refreshEnclosed(){
  const visited={},stack=[];
  function fenceBetween(x,y,nx,ny){
    if(nx===x+1)return S.fences[FK(x,y,'E')]||S.fences[FK(nx,ny,'W')];
    if(nx===x-1)return S.fences[FK(x,y,'W')]||S.fences[FK(nx,ny,'E')];
    if(ny===y+1)return S.fences[FK(x,y,'S')]||S.fences[FK(nx,ny,'N')];
    if(ny===y-1)return S.fences[FK(x,y,'N')]||S.fences[FK(nx,ny,'S')];
    return false;
  }
  for(let x=0;x<S.size;x++)for(let y=0;y<S.size;y++){
    const onB=x===0||y===0||x===S.size-1||y===S.size-1; if(!onB)continue;
    let leaks=false;
    if(x===0&&!S.fences[FK(x,y,'W')])leaks=true;
    if(y===0&&!S.fences[FK(x,y,'N')])leaks=true;
    if(x===S.size-1&&!S.fences[FK(x,y,'E')])leaks=true;
    if(y===S.size-1&&!S.fences[FK(x,y,'S')])leaks=true;
    if(leaks&&!visited[K(x,y)]){visited[K(x,y)]=true;stack.push([x,y]);}
  }
  while(stack.length){const [x,y]=stack.pop();
    for(const [nx,ny] of [[x+1,y],[x-1,y],[x,y+1],[x,y-1]]){
      if(!inGrid(nx,ny)||visited[K(nx,ny)]||fenceBetween(x,y,nx,ny))continue;
      visited[K(nx,ny)]=true;stack.push([nx,ny]);
    }
  }
  ENCLOSED={};
  for(let x=0;x<S.size;x++)for(let y=0;y<S.size;y++) if(!visited[K(x,y)]&&owned(x,y)) ENCLOSED[K(x,y)]=true;
}

/* ============================================================
   ACTIONS
   ============================================================ */
function plow(x,y){
  if(!owned(x,y))return toast('Terrain non possédé');
  if(S.ground[K(x,y)]==='soil')return;
  const cost=S.equip.freePlow?0:PRICE.plow;
  if(S.coins<cost)return toast('Pas assez de 🪙');
  addCoins(-cost); S.ground[K(x,y)]='soil'; save();
}
function plant(x,y,key){
  if(S.ground[K(x,y)]!=='soil')return toast('Laboure d\'abord 🚜');
  if(S.crop[K(x,y)])return toast('Déjà planté');
  if(S.coins<SEED[key])return toast('Pas assez de 🪙');
  addCoins(-SEED[key]); S.crop[K(x,y)]={key,at:Date.now()}; save();
}
function harvest(x,y){
  const c=S.crop[K(x,y)];if(!c)return;
  const cr=CROP[c.key]; if((Date.now()-c.at)/1000<cr.time*growMul())return toast('⏳ Pas mûr');
  const g=sellPrice(cr.sell); addCoins(g); addXp(3); delete S.crop[K(x,y)];
  FX.float(x,y,'+'+g); save(); UI.top();
}
function harvestAll(){
  let n=0,tot=0,now=Date.now();
  for(const key in S.crop){const c=S.crop[key];const cr=CROP[c.key];
    if((now-c.at)/1000>=cr.time*growMul()){const g=sellPrice(cr.sell);tot+=g;addCoins(g);addXp(3);delete S.crop[key];n++;}}
  if(n){toast('Récolte : +'+tot+' 🪙 ('+n+')');save();UI.top();}
  else toast('Rien de mûr');
}
function toggleFence(x,y,e){
  const k=FK(x,y,e);
  if(S.fences[k]){delete S.fences[k];refreshEnclosed();save();return;}
  if(S.coins<PRICE.fence)return toast('Pas assez de 🪙');
  addCoins(-PRICE.fence);S.fences[k]=true;refreshEnclosed();save();UI.top();
}
function buyLand(x,y){
  if(!inGrid(x,y)||owned(x,y))return;
  if(S.coins<PRICE.land)return toast('Pas assez de 🪙 (30)');
  addCoins(-PRICE.land);S.owned[K(x,y)]=true;S.ground[K(x,y)]='grass';refreshEnclosed();save();UI.top();
}
function placeBuilding(x,y,type){
  const def=BUILD[type];
  if(def.premium&&!HOLDER)return holderGate(def.name);
  if(!owned(x,y))return toast('Place sur ton terrain');
  if(S.ground[K(x,y)]==='soil'||S.crop[K(x,y)])return toast('Case déjà utilisée');
  if(S.buildings.some(b=>b.x===x&&b.y===y))return toast('Case occupée');
  if(S.coins<def.cost)return toast('Pas assez de 🪙');
  addCoins(-def.cost);S.buildings.push({type,x,y,at:Date.now()});addXp(15);save();UI.top();
}
function buyEquip(key){
  const e=EQUIP[key];
  if(S.equip[e.effect])return toast('Déjà acquis');
  if(S.coins<e.cost)return toast('Pas assez de 🪙');
  addCoins(-e.cost);S.equip[e.effect]=true;addXp(12);toast(e.name+' acheté !');save();UI.top();
}

function expandCost(){return Math.floor(150*Math.pow(1.4,S.size-6));}
function expandMap(){
  if(!HOLDER&&S.size>=8)return holderGate('Agrandissement');
  if(S.size>=12)return toast('🏆 Max');
  const c=expandCost();if(S.coins<c)return toast('Pas assez de 🪙 ('+c+')');
  addCoins(-c);S.size++;refreshEnclosed();save();UI.top();toast('Terrain agrandi !');
}

function xpNeed(l){return Math.floor(70*Math.pow(l,1.5));}
function addXp(n){S.xp+=n;while(S.xp>=xpNeed(S.level)){S.xp-=xpNeed(S.level);S.level++;addMail('🎉 Niveau '+S.level+' atteint !');FX.levelUp();}}

function addMail(txt){S.mail.unshift({id:Date.now()+Math.random(),txt,read:false});if(S.mail.length>30)S.mail.pop();}
function unreadMail(){return S.mail.filter(m=>!m.read).length;}

function holderGate(name){UI.holder(name);}

/* ============================================================
   LIVE TICK (foreground only; background handled by applyElapsed)
   ============================================================ */
function tick(){
  const now=Date.now();
  // foreground building production accrues into coins smoothly
  let per=0;
  for(const b of S.buildings) per+=BUILD[b.type].rate/60;
  if(per>0){ S._frac=(S._frac||0)+per; if(S._frac>=1){const g=Math.floor(S._frac);addCoins(g);S._frac-=g;} }
  // notify ripe crops occasionally via mail
  S.derniereUpdate=now;   // keep timestamp fresh while playing
  save(); UI.top();
}

/* ---- in-game clock (same cadence feel as tamagotchi: real time mapped) ---- */
function gameClock(){
  // 1 real hour = advances clock; show H:MM based on real elapsed since start
  const mins=Math.floor((Date.now()-S.startReal)/60000);
  let h=(S.gameStartHour*60+mins)/60;
  h=h%24;
  const hh=Math.floor(h), mm=Math.floor((h-hh)*60);
  const icon=(hh>=6&&hh<20)?'☀️':'🌙';
  return icon+' '+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
</script>
<script>/* ============================================================
   FrancFarm v3 — Renderer + UI. Charte Tamagotchi (Benoît).
   ============================================================ */
'use strict';
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const IMG={};for(const k in A){const i=new Image();i.src=A[k];IMG[k]=i;}
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function toast(m){const w=$('#toast');const d=el('div','toastmsg',m);w.appendChild(d);setTimeout(()=>d.remove(),1800);}

let cam={x:0,y:0,scale:1};
function resize(){cv.width=cv.clientWidth*devicePixelRatio;cv.height=cv.clientHeight*devicePixelRatio;}
addEventListener('resize',resize);

let MODE='play',plantKey='wheat',buildKey='coop';
const HINT={land:'🪙 Touche une case pour acheter (30)',plow:'🚜 Touche une case pour labourer',fence:'🚧 Touche un bord de case pour clôturer (10)',plant:'🌱 Touche une parcelle labourée',build:'🏗️ Touche une case en herbe pour bâtir'};
function setMode(m){MODE=m;document.querySelectorAll('.tool').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));const h=$('#modehint');h.textContent=HINT[m]||'';h.style.display=m==='play'?'none':'block';}

/* ---- FX ---- */
const FX={items:[],float(gx,gy,txt){this.items.push({s:isoToScreen(gx+.5,gy+.5),txt,t:0});},levelUp(){toast('🎉 Niveau '+S.level+' !');}};

/* ============================================================
   RENDER LOOP
   ============================================================ */
function origin(){return{ox:cv.width/2/devicePixelRatio,oy:96};}
function draw(){
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  const {ox,oy}=origin();
  ctx.save();ctx.translate(ox+cam.x,oy+cam.y);ctx.scale(cam.scale,cam.scale);
  const now=Date.now();
  const cells=[];for(let x=0;x<S.size;x++)for(let y=0;y<S.size;y++)cells.push([x,y]);
  cells.sort((a,b)=>(a[0]+a[1])-(b[0]+b[1]));

  // ground
  for(const [x,y] of cells){
    const s=isoToScreen(x,y);
    if(!owned(x,y)){drawDiamond(s.x,s.y,MODE==='land'?'rgba(240,192,64,.22)':'rgba(255,255,255,.05)','rgba(255,255,255,.16)');continue;}
    let key=S.ground[K(x,y)]==='soil'?'tile_soil':(ENCLOSED[K(x,y)]?'tile_pasture':'tile_grass');
    const im=IMG[key];if(im&&im.complete)ctx.drawImage(im,s.x-im.width/2,s.y-TH/2-6);
  }
  // crops — CENTERED on the tile (full square), 3 stages
  for(const [x,y] of cells){
    const c=S.crop[K(x,y)];if(!c)continue;
    const cr=CROP[c.key];const e=(now-c.at)/1000;const dur=cr.time*growMul();
    const st=e>=dur?2:(e/dur>0.5?1:0);
    const im=IMG['crop_'+c.key+'_'+st];const s=isoToScreen(x,y);
    if(im&&im.complete){
      // center the crop prop on the diamond's middle, sitting on the tile
      ctx.drawImage(im, s.x-im.width/2, s.y-im.height+TH/2 -2);
    }
    if(st===2){
      ctx.fillStyle='#f0c040';ctx.beginPath();ctx.arc(s.x,s.y-im.height+TH/2-8,8,0,7);ctx.fill();
      ctx.fillStyle='#1a1a2e';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('✓',s.x,s.y-im.height+TH/2-8);ctx.textBaseline='alphabetic';
    }
  }
  // fences
  for(const [x,y] of cells){const s=isoToScreen(x,y);
    ['N','E','S','W'].forEach(e=>{if(S.fences[FK(x,y,e)])fenceEdge(s,e);});}
  // buildings (EggClicker sprites) — anchored on tile center
  for(const b of [...S.buildings].sort((a,c)=>(a.x+a.y)-(c.x+c.y))){
    const def=BUILD[b.type];const im=IMG[def.sprite];const s=isoToScreen(b.x,b.y);
    if(im&&im.complete){const h=im.height,w=im.width;ctx.drawImage(im,s.x-w/2,s.y-h+TH/2+2);}
  }
  // hover
  if(hover&&['land','plow','plant','build'].includes(MODE)){const s=isoToScreen(hover.x,hover.y);drawDiamond(s.x,s.y,'rgba(240,192,64,.3)','rgba(240,192,64,.9)');}
  if(hover&&MODE==='fence'&&hoverEdge){const s=isoToScreen(hover.x,hover.y);fenceEdge(s,hoverEdge,true);}
  // float fx
  for(const f of FX.items){ctx.globalAlpha=Math.max(0,1-f.t/60);ctx.fillStyle='#fff';ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=3;ctx.font='bold 16px sans-serif';ctx.textAlign='center';const yy=f.s.y-30-f.t*.6;ctx.strokeText(f.txt,f.s.x,yy);ctx.fillText(f.txt,f.s.x,yy);ctx.globalAlpha=1;f.t++;}
  FX.items=FX.items.filter(f=>f.t<60);
  ctx.restore();
  requestAnimationFrame(draw);
}
function drawDiamond(cx,cy,fill,stroke){ctx.beginPath();ctx.moveTo(cx,cy-TH/2);ctx.lineTo(cx+TW/2,cy);ctx.lineTo(cx,cy+TH/2);ctx.lineTo(cx-TW/2,cy);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}}
function fenceEdge(s,edge,prev){
  const top={x:s.x,y:s.y-TH/2},right={x:s.x+TW/2,y:s.y},bot={x:s.x,y:s.y+TH/2},left={x:s.x-TW/2,y:s.y};
  let a,b;if(edge==='N'){a=left;b=top;}if(edge==='E'){a=top;b=right;}if(edge==='S'){a=right;b=bot;}if(edge==='W'){a=bot;b=left;}
  ctx.strokeStyle=prev?'rgba(240,192,64,.9)':'#7d4f1d';ctx.lineWidth=prev?5:6;ctx.beginPath();ctx.moveTo(a.x,a.y-18);ctx.lineTo(b.x,b.y-18);ctx.stroke();
  ctx.strokeStyle=prev?'rgba(240,192,64,.7)':'#a86f3c';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(a.x,a.y-10);ctx.lineTo(b.x,b.y-10);ctx.stroke();
  if(!prev){ctx.fillStyle='#7d4f1d';for(const p of [a,b])ctx.fillRect(p.x-2,p.y-22,4,22);}
}

/* ============================================================
   INPUT
   ============================================================ */
let hover=null,hoverEdge=null,dragging=false,dragMoved=false,lastP=null,pinch=0;
function toGrid(cx,cy){const r=cv.getBoundingClientRect();const {ox,oy}=origin();const sx=(cx-r.left-ox-cam.x)/cam.scale,sy=(cy-r.top-oy-cam.y)/cam.scale;return{g:screenToIso(sx,sy),sx,sy};}
function nearEdge(sx,sy,gx,gy){const s=isoToScreen(gx,gy);const E={N:[{x:s.x-TW/2,y:s.y},{x:s.x,y:s.y-TH/2}],E:[{x:s.x,y:s.y-TH/2},{x:s.x+TW/2,y:s.y}],S:[{x:s.x+TW/2,y:s.y},{x:s.x,y:s.y+TH/2}],W:[{x:s.x,y:s.y+TH/2},{x:s.x-TW/2,y:s.y}]};let best,bd=1e9;for(const e in E){const[a,b]=E[e];const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,d=(mx-sx)**2+(my-sy)**2;if(d<bd){bd=d;best=e;}}return best;}
function down(x,y){dragging=true;dragMoved=false;lastP={x,y};}
function move(x,y){if(dragging&&lastP){const dx=x-lastP.x,dy=y-lastP.y;if(Math.abs(dx)+Math.abs(dy)>4)dragMoved=true;cam.x+=dx;cam.y+=dy;lastP={x,y};}const{g,sx,sy}=toGrid(x,y);hover=inGrid(g.x,g.y)?g:null;if(MODE==='fence'&&hover)hoverEdge=nearEdge(sx,sy,g.x,g.y);}
function up(x,y){dragging=false;if(dragMoved){lastP=null;return;}const{g,sx,sy}=toGrid(x,y);if(!inGrid(g.x,g.y))return;tap(g.x,g.y,sx,sy);}
function tap(x,y,sx,sy){
  if(MODE==='land')return buyLand(x,y);
  if(MODE==='plow')return plow(x,y);
  if(MODE==='fence')return toggleFence(x,y,nearEdge(sx,sy,x,y));
  if(MODE==='plant')return plant(x,y,plantKey);
  if(MODE==='build')return placeBuilding(x,y,buildKey);
  // play: building? crop?
  const b=S.buildings.find(b=>b.x===x&&b.y===y);
  if(b){toast(BUILD[b.type].name+' — production en cours');return;}
  if(S.crop[K(x,y)])return harvest(x,y);
}
cv.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
cv.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
addEventListener('mouseup',e=>up(e.clientX,e.clientY));
cv.addEventListener('wheel',e=>{e.preventDefault();cam.scale=Math.max(.5,Math.min(2.2,cam.scale*(e.deltaY<0?1.1:.9)));},{passive:false});
cv.addEventListener('touchstart',e=>{if(e.touches.length===1)down(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2)pinch=tdist(e);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1)move(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){const d=tdist(e);if(pinch)cam.scale=Math.max(.5,Math.min(2.2,cam.scale*d/pinch));pinch=d;}},{passive:false});
cv.addEventListener('touchend',e=>{if(e.changedTouches.length)up(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
function tdist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

/* ============================================================
   UI — top bar Tamagotchi + sheets
   ============================================================ */
const RING_LEN=132; // 2*pi*21 from tama
const UI={
  top(){
    $('#hud-clock').textContent=gameClock();
    $('#hud-coins').textContent='🪙 '+Math.floor(S.coins);
    const frac=Math.min(1,S.xp/xpNeed(S.level));
    $('#hud-level').textContent=Math.round(frac*100)+'%';
    $('#xp-ring').style.strokeDashoffset=RING_LEN*(1-frac);
    // lock
    const lock=$('#game-wallet-lock');const ic=$('#game-wallet-lock-icon');
    if(HOLDER){lock.className='tb-lock holder-connected';ic.textContent='🔓';}
    else{lock.className='tb-lock holder-disconnected';ic.textContent='🔒';}
    // envelope blink if unread mail
    const env=$('#btn-envelope');const u=unreadMail();
    env.classList.toggle('envelope-blink',u>0);
    env.textContent=u>0?'📬':'📭';
  },
  openShop(kind){
    $('#sheet').classList.add('show');const b=$('#sheet-body');b.innerHTML='';
    if(kind==='plant'){$('#sheet-title').textContent='Graines 🌱';
      for(const k in CROP){const c=CROP[k];const r=el('div','shop-item',`<span class="emoji">🌱</span><div class="info"><div class="iname">${c.name}</div><div class="idesc">${SEED[k]}🪙 → ${sellPrice(c.sell)}🪙 · ${fmtTime(c.time)}</div></div>`);const btn=el('button','buy',SEED[k]+'🪙');btn.onclick=()=>{plantKey=k;setMode('plant');UI.closeSheet();toast('Plante : '+c.name);};r.appendChild(btn);b.appendChild(r);}}
    else if(kind==='build'){$('#sheet-title').textContent='Bâtiments 🏗️';
      for(const k in BUILD){const d=BUILD[k];const lock=d.premium&&!HOLDER;const own=S.buildings.filter(x=>x.type===k).length;
        const r=el('div','shop-item',`<span class="emoji">${d.out}</span><div class="info"><div class="iname">${d.name} ${own?'×'+own:''}</div><div class="idesc">${d.desc} (+${d.rate}🪙/min)</div></div>`);
        const btn=el('button','buy'+(lock?' lock':''),lock?'★ Holder':d.cost+'🪙');btn.onclick=()=>{if(lock)return holderGate(d.name);buildKey=k;setMode('build');UI.closeSheet();toast('Place : '+d.name);};r.appendChild(btn);b.appendChild(r);}}
    else if(kind==='equip'){$('#sheet-title').textContent='Matériel 🚜';
      for(const k in EQUIP){const e=EQUIP[k];const have=S.equip[e.effect];
        const r=el('div','shop-item',`<span class="emoji">${e.icon}</span><div class="info"><div class="iname">${e.name}</div><div class="idesc">${e.desc}</div></div>`);
        const btn=el('button','buy'+(have?' lock':''),have?'✓':e.cost+'🪙');btn.onclick=()=>{if(have)return;buyEquip(k);UI.openShop('equip');};r.appendChild(btn);b.appendChild(r);}}
    else if(kind==='expand'){$('#sheet-title').textContent='Agrandir ⛏️';const w=el('div');
      if(!HOLDER&&S.size>=8){w.innerHTML='<p class="hint">Découverte plafonnée à 8×8.<br>Holders $FRANC → 12×12.</p>';const g=el('button','bigbtn gold','★ Devenir holder');g.onclick=()=>holderGate('Agrandissement');w.appendChild(g);}
      else if(S.size>=12)w.innerHTML='<p class="hint">🏆 Max (12×12)</p>';
      else{w.innerHTML=`<p class="hint">Terrain : <b>${S.size}×${S.size}</b></p>`;const g=el('button','bigbtn','Agrandir (+1) — '+expandCost()+'🪙');g.onclick=()=>{expandMap();UI.openShop('expand');};w.appendChild(g);}
      b.appendChild(w);}
  },
  closeSheet(){$('#sheet').classList.remove('show');},
  mail(){
    $('#sheet').classList.add('show');$('#sheet-title').textContent='Courrier 📬';const b=$('#sheet-body');b.innerHTML='';
    if(!S.mail.length){b.innerHTML='<p class="hint">Aucun courrier pour l\'instant.</p>';}
    for(const m of S.mail){const r=el('div','mail-item'+(m.read?'':' unread'),m.txt);b.appendChild(r);}
    S.mail.forEach(m=>m.read=true);save();UI.top();
  },
  holder(name){$('#holdermodal').classList.add('show');$('#holder-feature').textContent=name;},
  closeHolder(){$('#holdermodal').classList.remove('show');},
};
function fmtTime(s){if(s<60)return s+'s';if(s<3600)return Math.round(s/60)+'min';return Math.round(s/3600)+'h';}

/* ============================================================
   BOOT — applique le temps écoulé (offline) puis lance
   ============================================================ */
function centerCam(){const mid=isoToScreen(S.size/2,S.size/2);cam.x=-mid.x*cam.scale;cam.y=0;}
function boot(){
  if(TG){try{TG.ready();TG.expand();}catch(e){}}
  HOLDER=detectHolder();
  const isNew=!load();if(isNew)S=fresh();
  resize();refreshEnclosed();centerCam();
  // OFFLINE PROGRESS
  if(!isNew){
    const rep=applyElapsed();
    if(rep.earned>0||rep.auto>0){
      let msg='Pendant ton absence ('+fmtDur(rep.sec)+') : ';
      const parts=[];if(rep.earned>0)parts.push('+'+rep.earned+' 🪙 produits');if(rep.auto>0)parts.push(rep.auto+' récoltes auto');
      msg+=parts.join(' · ');
      addMail('🌾 '+msg);
      setTimeout(()=>toast(msg),700);
    }
  }
  UI.top();setMode('play');
  setInterval(tick,1000);
  requestAnimationFrame(draw);
  if(isNew)setTimeout(()=>{addMail('👋 Bienvenue ! Ton terrain 6×6 est offert. Laboure 🚜 puis plante 🌱.');toast('Terrain 6×6 offert ! Laboure et plante 🌱');UI.top();},700);
}
function fmtDur(sec){if(sec<60)return Math.round(sec)+'s';if(sec<3600)return Math.round(sec/60)+'min';return (sec/3600).toFixed(1)+'h';}
addEventListener('load',boot);
// also recompute on tab refocus (returning to the app)
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&S){const rep=applyElapsed();if(rep.earned>0){toast('+'+rep.earned+' 🪙 hors-ligne');UI.top();}}});
</script>
</body>
