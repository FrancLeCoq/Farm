<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FrancFarm — La ferme du Coq Francis 🐓</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  --tile:64px;
  --grass:#7cb342; --grass-d:#558b2f; --grass-l:#aed581;
  --soil:#8d6e4f; --soil-d:#5d4632;
  --gold:#FFD700; --gold-d:#caa106;
  --wood:#b5762f; --wood-d:#7d4f1d;
  --cream:#fff7e6; --ink:#3a2a10;
  --green:#16a34a; --green-d:#15803d;
  --red:#d23b2c; --blue:#2e57c4;
  --panel:#fffaf0;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Fredoka',sans-serif;color:var(--ink);background:#86c1e8;touch-action:manipulation}
#game{position:relative;width:100%;height:100%;max-width:560px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}

/* sky / weather */
#sky{position:absolute;inset:0;z-index:0;transition:background 1.5s}
.sky.soleil{background:linear-gradient(180deg,#aee3f5,#d6f0ec 55%,var(--grass-l) 55%)}
.sky.nuit{background:linear-gradient(180deg,#1b2348,#2c3a6b 55%,#3c5226 55%)}
.sky.pluie{background:linear-gradient(180deg,#8fa6b5,#b5c6cf 55%,#6a9438 55%)}
.sky.orage{background:linear-gradient(180deg,#4a4f63,#6b7385 55%,#5c7a34 55%)}
#weathericon{position:absolute;top:10px;right:14px;width:54px;height:54px;z-index:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));animation:bob 4s ease-in-out infinite}
#rain{position:absolute;inset:0;display:none;z-index:1;pointer-events:none;
  background-image:repeating-linear-gradient(115deg,transparent 0 8px,rgba(255,255,255,.35) 8px 9px);
  background-size:40px 40px;animation:rainmove .5s linear infinite;opacity:.5}
@keyframes rainmove{to{background-position:40px 40px}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* top bar */
#top{position:relative;z-index:10;display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:linear-gradient(180deg,var(--wood),var(--wood-d));box-shadow:0 3px 0 rgba(0,0,0,.25)}
.chip{display:flex;align-items:center;gap:5px;background:var(--cream);border:2px solid var(--wood-d);
  border-radius:18px;padding:3px 10px;font-weight:600;font-size:15px}
.chip img{width:18px;height:18px}
#levelwrap{flex:1;min-width:0}
#xpbar-bg{height:9px;background:rgba(0,0,0,.28);border-radius:6px;overflow:hidden;border:1px solid rgba(0,0,0,.2);margin-top:2px}
#xpbar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#fff0a0);transition:width .4s}
#levelline{display:flex;justify-content:space-between;color:var(--cream);font-size:11px;font-weight:600;text-shadow:0 1px 0 rgba(0,0,0,.4)}
.holderchip{font-family:'Bangers';letter-spacing:1px;font-size:13px;padding:2px 9px;border-radius:14px;border:2px solid}
.holderchip.on{background:var(--gold);color:var(--ink);border-color:var(--gold-d)}
.holderchip.off{background:rgba(0,0,0,.2);color:var(--cream);border-color:rgba(255,255,255,.3)}

/* field */
#field{flex:1;position:relative;z-index:5;overflow:auto}
#scroll{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px 12px 12px}
#grid{display:grid;gap:7px;width:max-content;margin:auto}
.tile{width:var(--tile);height:var(--tile);border-radius:12px;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:transform .08s;box-shadow:0 3px 0 rgba(0,0,0,.18)}
.tile:active{transform:scale(.93)}
.t-empty{background:repeating-linear-gradient(90deg,var(--soil) 0 8px,var(--soil-d) 8px 10px);border:3px solid var(--soil-d);opacity:.9}
.t-crop{background:repeating-linear-gradient(90deg,var(--soil) 0 8px,var(--soil-d) 8px 10px);border:3px solid var(--soil-d)}
.t-animal{background:radial-gradient(circle at 50% 30%,var(--grass-l),var(--grass));border:3px solid var(--grass-d)}
.t-factory{background:linear-gradient(180deg,#cdb38b,#a8855a);border:3px solid var(--wood-d)}
.tile.ready{animation:ready 1s infinite;box-shadow:0 0 0 3px var(--gold),0 3px 0 rgba(0,0,0,.2)}
@keyframes ready{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.tile .big{font-size:32px;line-height:1}
.tile .spr{height:84%;object-fit:contain;filter:drop-shadow(0 3px 3px rgba(0,0,0,.35))}
.sprout{filter:drop-shadow(0 2px 1px rgba(0,0,0,.2))}
.badge{position:absolute;top:-7px;right:-7px;background:var(--gold);color:var(--ink);font-size:13px;font-weight:700;
  border-radius:11px;padding:1px 5px;border:2px solid var(--gold-d);min-width:20px;text-align:center}
.pbar-bg{position:absolute;left:5px;right:5px;bottom:4px;height:5px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden}
.pbar{height:100%;width:0;background:var(--grass-l)}

/* fx */
#fxlayer{position:absolute;inset:0;z-index:30;pointer-events:none}
#fxlayer #fox{position:absolute;width:62px;z-index:31;pointer-events:auto;cursor:pointer;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));animation:foxwiggle .4s ease-in-out infinite}
@keyframes foxwiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.fx-coin{position:absolute;transform:translateX(-50%);font-weight:700;color:var(--gold);font-size:16px;
  text-shadow:0 1px 2px rgba(0,0,0,.5);animation:floatup 1.1s forwards}
.fx-pop{position:absolute;transform:translateX(-50%);font-size:28px;animation:floatup 1.1s forwards}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,4px)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-40px)}}
.fx-levelup{position:absolute;top:36%;left:50%;transform:translateX(-50%);font-family:'Bangers';font-size:30px;letter-spacing:2px;
  color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.7),0 3px 0 var(--gold-d);animation:lvlpop 1.8s forwards}
@keyframes lvlpop{0%{opacity:0;transform:translateX(-50%) scale(.5)}20%{opacity:1;transform:translateX(-50%) scale(1.1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1)}}

/* bottom bar */
#bottom{position:relative;z-index:10;display:flex;gap:7px;padding:9px;
  background:linear-gradient(0deg,var(--wood),var(--wood-d));box-shadow:0 -3px 0 rgba(0,0,0,.25)}
.navbtn{flex:1;background:var(--cream);border:2px solid var(--wood-d);border-radius:13px;padding:7px 2px;
  font-family:'Fredoka';font-weight:600;font-size:12px;cursor:pointer;text-align:center;
  box-shadow:0 3px 0 var(--wood-d);transition:transform .06s;position:relative}
.navbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--wood-d)}
.navbtn .ic{display:block;font-size:22px;margin-bottom:1px}
#dailybadge{position:absolute;top:-5px;right:-3px;background:var(--red);color:#fff;font-size:11px;font-weight:700;
  border-radius:10px;padding:0 5px;border:2px solid #fff;display:none}

/* toast */
#toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toastmsg{background:rgba(58,42,16,.94);color:var(--cream);padding:8px 15px;border-radius:20px;font-weight:600;font-size:13px;
  border:2px solid var(--gold);animation:trise 1.7s forwards;text-align:center}
@keyframes trise{0%{opacity:0;transform:translateY(10px)}12%{opacity:1;transform:translateY(0)}82%{opacity:1}100%{opacity:0;transform:translateY(-14px)}}

/* sheet (bottom modal) */
#sheet{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
#sheet.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet-card{width:100%;max-width:560px;max-height:78%;background:var(--panel);border-radius:22px 22px 0 0;
  border-top:4px solid var(--wood-d);box-shadow:0 -8px 24px rgba(0,0,0,.3);display:flex;flex-direction:column;animation:slideup .25s}
@keyframes slideup{from{transform:translateY(40px)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
  background:linear-gradient(180deg,var(--gold),var(--gold-d));border-radius:18px 18px 0 0}
.sheet-head h2{font-family:'Bangers';letter-spacing:1px;font-size:21px;color:var(--ink)}
.closeX{background:var(--red);color:#fff;border:2px solid #911f15;border-radius:50%;width:30px;height:30px;font-weight:700;cursor:pointer;font-size:15px}
#sheet-body{padding:12px;overflow:auto}
.tabrow{display:flex;gap:6px;margin-bottom:11px}
.tab{flex:1;padding:8px 2px;border:2px solid var(--wood);border-radius:10px;background:var(--cream);
  font-family:'Fredoka';font-weight:600;font-size:13px;cursor:pointer}
.tab.active{background:var(--gold);border-color:var(--gold-d)}
.shoplist{display:flex;flex-direction:column;gap:9px}
.shop-item{display:flex;align-items:center;gap:11px;background:var(--cream);border:2px solid var(--wood);border-radius:13px;padding:9px}
.shop-item .emoji{font-size:30px}
.shop-item .info{flex:1;min-width:0}
.iname{font-weight:600;font-size:14px}
.idesc{font-size:11px;opacity:.72;line-height:1.3}
.buy{background:var(--green);color:#fff;border:2px solid var(--green-d);border-radius:10px;padding:8px 11px;
  font-family:'Fredoka';font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;box-shadow:0 2px 0 var(--green-d)}
.buy:active{transform:translateY(1px)}
.buy.lock{background:#b6a98c;border-color:#8c7e5e;box-shadow:0 2px 0 #8c7e5e}
.hint{text-align:center;font-size:13px;opacity:.8;margin:6px 0 12px;line-height:1.4}
.bigbtn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Bangers';letter-spacing:1px;font-size:18px;
  color:#fff;background:linear-gradient(135deg,var(--green),var(--green-d));cursor:pointer;margin-bottom:10px;box-shadow:0 4px 0 var(--green-d)}
.bigbtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--ink);box-shadow:0 4px 0 var(--gold-d)}
.bigbtn:active{transform:translateY(2px)}
.quest{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--cream);
  border:2px solid var(--wood);border-radius:12px;padding:10px;margin-bottom:8px}
.quest.done{border-color:var(--green);background:#eafbe8}
.qlabel{font-weight:600;font-size:13px}
.qprog{font-size:11px;opacity:.65}
.qreward{font-weight:700;color:var(--green-d);font-size:13px}

/* holder modal */
#holdermodal{position:absolute;inset:0;z-index:70;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:22px}
#holdermodal.show{display:flex}
.holder-card{background:var(--panel);border:4px solid var(--gold-d);border-radius:20px;max-width:340px;text-align:center;
  padding:0 0 18px;box-shadow:0 8px 0 rgba(0,0,0,.3);overflow:hidden}
.holder-card .hh{background:linear-gradient(180deg,var(--gold),var(--gold-d));padding:14px;font-family:'Bangers';font-size:22px;letter-spacing:1px}
.holder-card img{width:120px;margin:14px auto 6px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.holder-card p{padding:0 18px;font-size:14px;line-height:1.5;margin-bottom:14px}
.holder-card b{color:var(--gold-d)}
.holder-btns{display:flex;gap:8px;padding:0 18px}
.holder-btns button{flex:1;padding:11px;border:none;border-radius:12px;font-family:'Fredoka';font-weight:600;cursor:pointer;font-size:13px}
.hb-close{background:#ddd}
.hb-go{background:var(--green);color:#fff}
</style>
</head>

  epouvantail:{emoji:'🎏',name:'Épouvantail', cost:150, desc:'-25% dégâts intempéries.', premium:false, lvl:3},
};

// Niveaux
function xpForLevel(l){ return Math.floor(50*Math.pow(l,1.5)); }
const RANKS = ['Poussin','Fermier','Coq affairé','Maître des champs','Baron rural','Magnat du grain','Légende de FrancFarm'];

/* ============================================================
   ÉTAT
   ============================================================ */
let S;
function freshState(){
  return {
    francs: 40, xp:0, level:1,
    cols:3, rows:3,
    plots: [], // each: {kind:'empty'|'crop'|'animal'|'factory', ...}
    inv: {}, // resources: ble, oeuf, lait, farine, pain...
    village: {}, // key -> count
    weather: 'soleil', // soleil|pluie|orage|nuit
    weatherUntil: 0,
    daily: {date:null, claimed:false, streak:0, tasks:[]},
    stats:{harvests:0, produced:0, foxesBeaten:0},
    lastTick: Date.now(),
    lastFox: Date.now(),
    lastWeather: Date.now(),
    tutorialDone:false,
  };
}

function totalPlots(){ return S.cols*S.rows; }
function ensurePlots(){
  while(S.plots.length < totalPlots()) S.plots.push({kind:'empty'});
  S.plots = S.plots.slice(0, totalPlots());
}

/* ---- inventory helpers ---- */
function inv(k){ return S.inv[k]||0; }
function addInv(k,n){ S.inv[k]=(S.inv[k]||0)+n; if(S.inv[k]<0)S.inv[k]=0; }
function canPay(map){ for(const k in map){ if(inv(k)<map[k]) return false; } return true; }
function payInv(map){ for(const k in map) addInv(k,-map[k]); }

/* ============================================================
   PERSISTENCE
   ============================================================ */
function save(){ try{localStorage.setItem(SAVE_KEY, JSON.stringify(S));}catch(e){} }
function load(){
  try{ const r=localStorage.getItem(SAVE_KEY); if(r){ S=JSON.parse(r); return true; } }catch(e){}
  return false;
}

/* ============================================================
   PROGRESSION
   ============================================================ */
function addXp(n){
  S.xp += n;
  while(S.xp >= xpForLevel(S.level)){ S.xp -= xpForLevel(S.level); S.level++; FX.levelUp(S.level); }
}
function rank(){ return RANKS[Math.min(RANKS.length-1, Math.floor((S.level-1)/2))]; }
function addFrancs(n){ S.francs += n; }

/* ============================================================
   GATING $FRANC
   ============================================================ */
let HOLDER = detectHolder();
const FREE_MAX_PLOTS = 16;     // non-holders plafonnés à 4x4
const FREE_MAX_LEVEL = 5;
function premiumLocked(item){
  if(!item.premium) return false;
  return !HOLDER;
}

/* ============================================================
   ACTIONS DE JEU
   ============================================================ */
function plantCrop(i, key){
  const c=CROPS[key]; const p=S.plots[i];
  if(p.kind!=='empty') return toast('Parcelle occupée');
  if(c.lvl && S.level<c.lvl) return toast('🔒 Niveau '+c.lvl+' requis');
  if(premiumLocked(c)) return holderGate(c.name);
  if(S.francs < c.seed) return toast('Pas assez de 🪙');
  addFrancs(-c.seed);
  S.plots[i]={kind:'crop', crop:key, at:Date.now(), grow:growMul()};
  save(); UI.renderField();
}
function harvestPlot(i){
  const p=S.plots[i]; if(p.kind!=='crop') return;
  const c=CROPS[p.crop];
  const dur=c.time*(p.grow||1);
  if((Date.now()-p.at)/1000 < dur) return toast('⏳ Pas mûr');
  let gain=c.yield;
  if(S.village.chat) gain=Math.floor(gain*1.0); // chat bonus is XP
  addFrancs(gain); addInv(p.crop, 1);
  let xp=c.xp; if(S.village.chat) xp=Math.ceil(xp*1.05);
  addXp(xp); S.stats.harvests++;
  S.plots[i]={kind:'empty'};
  FX.coin(i, gain);
  save(); UI.renderField(); UI.renderTop();
  checkTasks('harvest');
}
function placeAnimal(i, key){
  const a=ANIMALS[key]; const p=S.plots[i];
  if(p.kind!=='empty') return toast('Parcelle occupée');
  if(a.lvl && S.level<a.lvl) return toast('🔒 Niveau '+a.lvl+' requis');
  if(premiumLocked(a)) return holderGate(a.name);
  if(S.francs<a.cost) return toast('Pas assez de 🪙');
  addFrancs(-a.cost);
  S.plots[i]={kind:'animal', animal:key, fed:false, at:0};
  addXp(a.xp); save(); UI.renderField(); UI.renderTop();
}
function feedAnimal(i){
  const p=S.plots[i]; const a=ANIMALS[p.animal];
  const need={}; need[a.feed]=a.feedQty;
  if(p.fed){
    // ready to collect?
    if((Date.now()-p.at)/1000 >= a.time){
      addInv(a.produces,1); p.fed=false; p.at=0;
      S.stats.produced++; FX.pop(i, a.out);
      checkTasks('produce'); save(); UI.renderField();
    } else toast('⏳ '+a.name+' produit encore');
    return;
  }
  if(!canPay(need)) return toast('Besoin de '+a.feedQty+' '+CROPS[a.feed].emoji);
  payInv(need); p.fed=true; p.at=Date.now();
  save(); UI.renderField();
}
function placeFactory(i, key){
  const f=FACTORIES[key]; const p=S.plots[i];
  if(p.kind!=='empty') return toast('Parcelle occupée');
  if(f.lvl && S.level<f.lvl) return toast('🔒 Niveau '+f.lvl+' requis');
  if(premiumLocked(f)) return holderGate(f.name);
  if(S.francs<f.cost) return toast('Pas assez de 🪙');
  addFrancs(-f.cost);
  S.plots[i]={kind:'factory', factory:key, state:'idle', at:0};
  addXp(20); save(); UI.renderField(); UI.renderTop();
}
function tapFactory(i){
  const p=S.plots[i]; const f=FACTORIES[p.factory]; const r=f.recipe;
  if(p.state==='idle'){
    if(!canPay(r.in)) return toast('Manque des ingrédients');
    payInv(r.in); p.state='working'; p.at=Date.now();
    save(); UI.renderField();
  } else if(p.state==='working'){
    if((Date.now()-p.at)/1000>=r.time){ p.state='done'; }
    else return toast('⏳ Production en cours');
    save(); UI.renderField();
  }
  if(p.state==='done'){
    addInv(r.out,1); addFrancs(r.sell);
    addXp(Math.ceil(r.sell/8)); S.stats.produced++;
    p.state='idle'; p.at=0; FX.coin(i, r.sell);
    checkTasks('produce'); save(); UI.renderField(); UI.renderTop();
  }
}

/* ---- weather mult ---- */
function growMul(){
  let m=1;
  if(S.village.epouvantail) m*=1;
  if(S.weather==='pluie') m*=0.8;   // rain = faster
  if(S.weather==='orage') m*=1.5;   // storm = slower
  return m;
}

/* ============================================================
   EXTENSION
   ============================================================ */
function expandCost(){ const n=totalPlots(); return Math.floor(50*Math.pow(1.5, n-9) + n*20); }
function expand(dir){
  if(!HOLDER && totalPlots()>=FREE_MAX_PLOTS) return holderGate('Agrandissement');
  if(S.cols>=6 && S.rows>=6) return toast('🏆 Ferme au maximum');
  const cost=expandCost();
  if(S.francs<cost) return toast('Pas assez de 🪙');
  addFrancs(-cost);
  if(dir==='col' && S.cols<6) S.cols++;
  else if(dir==='row' && S.rows<6) S.rows++;
  else if(S.cols<6) S.cols++; else S.rows++;
  ensurePlots(); addXp(10);
  save(); UI.renderField(); UI.renderTop();
}

/* ============================================================
   ÉVÉNEMENTS : renards + intempéries
   ============================================================ */
let activeFox = null;
function maybeFox(){
  if(activeFox) return;
  // only if there is something to steal
  const ripe = S.plots.findIndex(p=>p.kind==='crop' && (Date.now()-p.at)/1000>=CROPS[p.crop].time*(p.grow||1));
  const animal = S.plots.findIndex(p=>p.kind==='animal');
  const target = ripe>=0?ripe:(animal>=0?animal:-1);
  if(target<0) return;
  // chien protects 50%
  if(S.village.chien && Math.random()<0.5) return;
  activeFox={plot:target, until:Date.now()+9000};
  UI.showFox(target);
}
function scareFox(){
  if(!activeFox) return;
  S.stats.foxesBeaten++; addFrancs(5); addXp(3);
  toast('🦊 Renard chassé ! +5 🪙');
  activeFox=null; UI.hideFox(); checkTasks('fox'); save();
}
function foxSteals(){
  if(!activeFox) return;
  const p=S.plots[activeFox.plot];
  if(p && p.kind==='crop'){ S.plots[activeFox.plot]={kind:'empty'}; toast('🦊 Le renard a volé ta récolte !'); }
  else if(p && p.kind==='animal'){ p.fed=false; p.at=0; toast('🦊 Le renard a effrayé l\'animal !'); }
  activeFox=null; UI.hideFox(); save(); UI.renderField();
}

const WEATHERS=['soleil','soleil','soleil','pluie','nuit','orage'];
function rollWeather(){
  const w=WEATHERS[Math.floor(Math.random()*WEATHERS.length)];
  S.weather=w; S.weatherUntil=Date.now()+ (60+Math.random()*60)*1000;
  UI.applyWeather(w);
  if(w==='orage' && !S.village.epouvantail && Math.random()<0.3){
    // storm damages a random growing crop
    const idx=S.plots.findIndex(p=>p.kind==='crop');
    if(idx>=0){ S.plots[idx]={kind:'empty'}; toast('⛈️ L\'orage a abîmé une culture'); UI.renderField(); }
  }
}

/* ============================================================
   QUÊTES QUOTIDIENNES + STREAK
   ============================================================ */
function todayStr(){ return new Date().toISOString().slice(0,10); }
function rollDaily(){
  const t=todayStr();
  if(S.daily.date===t) return;
  // streak
  const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  S.daily.streak = (S.daily.date===yest)? S.daily.streak+1 : 1;
  S.daily.date=t; S.daily.claimed=false;
  S.daily.tasks=[
    {id:'harvest', label:'Récolter 8 cultures', goal:8, n:0, reward:30, done:false},
    {id:'produce', label:'Produire 3 biens', goal:3, n:0, reward:45, done:false},
    {id:'fox', label:'Chasser 2 renards', goal:2, n:0, reward:25, done:false},
  ];
  save();
}
function checkTasks(kind){
  let changed=false;
  for(const tk of S.daily.tasks){
    if(tk.id===kind && !tk.done){ tk.n++; if(tk.n>=tk.goal){ tk.done=true; } changed=true; }
  }
  if(changed){ save(); UI.renderDailyBadge(); }
}
function claimDaily(){
  let total=0, n=0;
  for(const tk of S.daily.tasks){ if(tk.done && !tk.paid){ total+=tk.reward; tk.paid=true; n++; } }
  // streak bonus
  if(S.daily.tasks.every(t=>t.done) && !S.daily.claimed){
    const bonus=10*S.daily.streak; total+=bonus; S.daily.claimed=true;
    toast('🔥 Série '+S.daily.streak+' jours : +'+bonus+' 🪙');
  }
  if(total>0){ addFrancs(total); toast('Quêtes : +'+total+' 🪙'); save(); UI.renderTop(); UI.renderDailyBadge(); }
  else if(n===0) toast('Aucune quête terminée');
}

function holderGate(name){
  UI.openHolderModal(name);
}

/* ============================================================
   BOUCLE DE JEU
   ============================================================ */
function tick(){
  const now=Date.now();
  // weather cycle
  if(now > S.weatherUntil) rollWeather();
  // fox spawn ~every 35-70s
  if(now - S.lastFox > (35+Math.random()*35)*1000){ S.lastFox=now; maybeFox(); }
  if(activeFox && now>activeFox.until) foxSteals();
  S.lastTick=now;
  UI.renderField();
  save();
}


/* ---- extra global helpers used by buttons ---- */
function harvestAllReady(){
  let total=0,n=0; const now=Date.now();
  S.plots.forEach((p,i)=>{
    if(p.kind==='crop'){ const c=CROPS[p.crop]; if((now-p.at)/1000>=c.time*(p.grow||1)){ harvestPlot(i); n++; } }
  });
  if(n===0) toast('Rien de mûr à récolter');
}
</script>
<script>
/* ============================================================
   FrancFarm — UI, effets visuels, écrans. Code original.
   ============================================================ */
'use strict';

const A = window.FRANC_ASSETS || {}; // base64 assets injected in HTML

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
function toast(msg){
  const wrap=$('#toast'); const d=el('div','toastmsg',msg); wrap.appendChild(d);
  setTimeout(()=>d.remove(),1700);
}

/* ============================================================
   EFFETS
   ============================================================ */
const FX={
  coin(plotIdx, amount){
    const cell=document.querySelector(`[data-plot="${plotIdx}"]`); if(!cell)return;
    const r=cell.getBoundingClientRect(); const g=$('#fxlayer').getBoundingClientRect();
    const f=el('div','fx-coin','+'+amount+' <img src="'+A.franc+'" style="width:16px;vertical-align:-3px">');
    f.style.left=(r.left-g.left+r.width/2)+'px'; f.style.top=(r.top-g.top)+'px';
    $('#fxlayer').appendChild(f); setTimeout(()=>f.remove(),1100);
  },
  pop(plotIdx, emoji){
    const cell=document.querySelector(`[data-plot="${plotIdx}"]`); if(!cell)return;
    const r=cell.getBoundingClientRect(); const g=$('#fxlayer').getBoundingClientRect();
    const f=el('div','fx-pop',emoji);
    f.style.left=(r.left-g.left+r.width/2)+'px'; f.style.top=(r.top-g.top)+'px';
    $('#fxlayer').appendChild(f); setTimeout(()=>f.remove(),1100);
  },
  levelUp(lvl){
    toast('🎉 Niveau '+lvl+' — '+rank()+' !');
    const b=el('div','fx-levelup','⭐ NIVEAU '+lvl+' ⭐');
    $('#fxlayer').appendChild(b); setTimeout(()=>b.remove(),1800);
    UI.renderTop();
  }
};

/* ============================================================
   UI
   ============================================================ */
const UI={
  /* ---- top bar ---- */
  renderTop(){
    $('#francs').textContent = Math.floor(S.francs);
    const need=xpForLevel(S.level);
    $('#xpbar').style.width=Math.min(100,(S.xp/need)*100)+'%';
    $('#leveltxt').textContent='Niv. '+S.level;
    $('#ranktxt').textContent=rank();
    $('#holderchip').textContent = HOLDER ? '★ Holder $FRANC' : 'Mode découverte';
    $('#holderchip').className = 'holderchip '+(HOLDER?'on':'off');
  },

  /* ---- the field ---- */
  renderField(){
    const grid=$('#grid');
    grid.style.gridTemplateColumns=`repeat(${S.cols}, var(--tile))`;
    // build once, then update — simplest: rebuild
    grid.innerHTML='';
    const now=Date.now();
    S.plots.forEach((p,i)=>{
      const cell=el('div','tile'); cell.dataset.plot=i;
      if(p.kind==='empty'){ cell.classList.add('t-empty'); }
      else if(p.kind==='crop'){
        const c=CROPS[p.crop]; const dur=c.time*(p.grow||1);
        const e=(now-p.at)/1000; const ready=e>=dur;
        cell.classList.add('t-crop');
        if(ready){ cell.classList.add('ready'); cell.innerHTML='<span class="big">'+c.emoji+'</span>'; cell.appendChild(badge('✓')); }
        else{
          const stage=e/dur;
          cell.innerHTML='<span class="big sprout">'+(stage<0.5?'🌱':'🌿')+'</span>';
          cell.appendChild(progress(stage));
        }
      }
      else if(p.kind==='animal'){
        const a=ANIMALS[p.animal]; cell.classList.add('t-animal');
        if(a.sprite && A[a.sprite]) cell.innerHTML='<img class="spr" src="'+A[a.sprite]+'">';
        else cell.innerHTML='<span class="big">'+a.emoji+'</span>';
        if(!p.fed) cell.appendChild(badge('🍽️'));
        else{
          const e=(now-p.at)/1000; const ready=e>=a.time;
          if(ready){ cell.classList.add('ready'); cell.appendChild(badge(a.out)); }
          else cell.appendChild(progress(e/a.time));
        }
      }
      else if(p.kind==='factory'){
        const f=FACTORIES[p.factory]; cell.classList.add('t-factory');
        if(f.sprite && A[f.sprite]) cell.innerHTML='<img class="spr" src="'+A[f.sprite]+'">';
        else cell.innerHTML='<span class="big">'+f.emoji+'</span>';
        if(p.state==='working'){
          const e=(now-p.at)/1000; const ready=e>=f.recipe.time;
          if(ready){ cell.classList.add('ready'); cell.appendChild(badge(f.recipe.outEmoji)); }
          else cell.appendChild(progress(e/f.recipe.time));
        } else if(p.state==='done'){ cell.classList.add('ready'); cell.appendChild(badge(f.recipe.outEmoji)); }
        else cell.appendChild(badge('▶'));
      }
      cell.onclick=()=>UI.tapPlot(i);
      grid.appendChild(cell);
    });
    // fox overlay position
    if(activeFox) UI.showFox(activeFox.plot);
  },

  tapPlot(i){
    const p=S.plots[i];
    if(p.kind==='empty') UI.openBuildMenu(i);
    else if(p.kind==='crop') harvestPlot(i);
    else if(p.kind==='animal') feedAnimal(i);
    else if(p.kind==='factory') tapFactory(i);
  },

  /* ---- build menu for an empty plot ---- */
  openBuildMenu(i){
    const m=$('#sheet'); m.classList.add('show');
    $('#sheet-title').textContent='Parcelle libre';
    const body=$('#sheet-body'); body.innerHTML='';
    const tabs=el('div','tabrow');
    ['Cultures','Animaux','Production'].forEach((t,ti)=>{
      const b=el('button','tab'+(ti===0?' active':''),t); b.onclick=()=>showTab(ti); tabs.appendChild(b);
    });
    body.appendChild(tabs);
    const list=el('div','shoplist'); body.appendChild(list);
    function showTab(ti){
      [...tabs.children].forEach((c,ci)=>c.classList.toggle('active',ci===ti));
      list.innerHTML='';
      if(ti===0) for(const k in CROPS) list.appendChild(cropRow(k,i));
      if(ti===1) for(const k in ANIMALS) list.appendChild(animalRow(k,i));
      if(ti===2) for(const k in FACTORIES) list.appendChild(factoryRow(k,i));
    }
    showTab(0);
  },

  /* ---- shops triggered from bottom bar ---- */
  openShop(kind){
    const m=$('#sheet'); m.classList.add('show');
    const body=$('#sheet-body'); body.innerHTML='';
    if(kind==='village'){
      $('#sheet-title').textContent='Village 🏡';
      const list=el('div','shoplist'); body.appendChild(list);
      for(const k in VILLAGE) list.appendChild(villageRow(k));
    } else if(kind==='expand'){
      $('#sheet-title').textContent='Agrandir la ferme ⛏️';
      body.appendChild(expandPanel());
    } else if(kind==='daily'){
      $('#sheet-title').textContent='Quêtes du jour 📜';
      body.appendChild(dailyPanel());
    }
  },

  closeSheet(){ $('#sheet').classList.remove('show'); },

  /* ---- weather ---- */
  applyWeather(w){
    const sky=$('#sky'); sky.className='sky '+w;
    const icon=$('#weathericon');
    if(w==='nuit'){ icon.src=A.lune; icon.style.display='block'; }
    else if(w==='soleil'){ icon.src=A.soleil; icon.style.display='block'; }
    else icon.style.display='none';
    $('#rain').style.display=(w==='pluie'||w==='orage')?'block':'none';
  },

  /* ---- fox ---- */
  showFox(plotIdx){
    const cell=document.querySelector(`[data-plot="${plotIdx}"]`);
    const layer=$('#fxlayer'); if(!cell)return;
    let fox=$('#fox'); if(!fox){ fox=el('img','','' ); fox.id='fox'; fox.src=A.renards; layer.appendChild(fox); fox.onclick=scareFox; }
    fox.style.display='block';
    const r=cell.getBoundingClientRect(); const g=layer.getBoundingClientRect();
    fox.style.left=(r.left-g.left-6)+'px'; fox.style.top=(r.top-g.top-30)+'px';
  },
  hideFox(){ const f=$('#fox'); if(f)f.style.display='none'; },

  /* ---- daily badge ---- */
  renderDailyBadge(){
    const done=S.daily.tasks.filter(t=>t.done).length;
    const b=$('#dailybadge');
    if(done>0){ b.style.display='block'; b.textContent=done; } else b.style.display='none';
  },

  openHolderModal(name){
    const o=$('#holdermodal'); o.classList.add('show');
    $('#holder-feature').textContent=name;
  },
  closeHolder(){ $('#holdermodal').classList.remove('show'); }
};

/* ---- small render helpers ---- */
function badge(txt){ return el('div','badge',txt); }
function progress(frac){ const bg=el('div','pbar-bg'); const b=el('div','pbar'); b.style.width=Math.min(100,frac*100)+'%'; bg.appendChild(b); return bg; }

function lockTag(item){
  if(item.lvl && S.level<item.lvl) return '🔒 Niv.'+item.lvl;
  if(premiumLocked(item)) return '★ Holder';
  return null;
}

function cropRow(k,i){
  const c=CROPS[k]; const lock=lockTag(c);
  const row=el('div','shop-item');
  row.innerHTML=`<span class="emoji">${c.emoji}</span>
    <div class="info"><div class="iname">${c.name}</div>
    <div class="idesc">${c.seed}🪙 → ${c.yield}🪙 · ${c.time}s</div></div>`;
  const btn=el('button','buy'+(lock?' lock':''), lock||c.seed+'🪙');
  btn.onclick=()=>{ if(c.lvl&&S.level<c.lvl)return toast('🔒 Niveau '+c.lvl); if(premiumLocked(c))return holderGate(c.name); plantCrop(i,k); UI.closeSheet(); };
  row.appendChild(btn); return row;
}
function animalRow(k,i){
  const a=ANIMALS[k]; const lock=lockTag(a);
  const row=el('div','shop-item');
  row.innerHTML=`<span class="emoji">${a.emoji}</span>
    <div class="info"><div class="iname">${a.name}</div>
    <div class="idesc">Nourrir ${a.feedQty}${CROPS[a.feed].emoji} → ${a.out} (${a.time}s)</div></div>`;
  const btn=el('button','buy'+(lock?' lock':''), lock||a.cost+'🪙');
  btn.onclick=()=>{ if(a.lvl&&S.level<a.lvl)return toast('🔒 Niveau '+a.lvl); if(premiumLocked(a))return holderGate(a.name); placeAnimal(i,k); UI.closeSheet(); };
  row.appendChild(btn); return row;
}
function factoryRow(k,i){
  const f=FACTORIES[k]; const r=f.recipe; const lock=lockTag(f);
  const ing=Object.entries(r.in).map(([x,n])=>n+resEmoji(x)).join(' ');
  const row=el('div','shop-item');
  row.innerHTML=`<span class="emoji">${f.emoji}</span>
    <div class="info"><div class="iname">${f.name}</div>
    <div class="idesc">${ing} → ${r.outEmoji} (+${r.sell}🪙)</div></div>`;
  const btn=el('button','buy'+(lock?' lock':''), lock||f.cost+'🪙');
  btn.onclick=()=>{ if(f.lvl&&S.level<f.lvl)return toast('🔒 Niveau '+f.lvl); if(premiumLocked(f))return holderGate(f.name); placeFactory(i,k); UI.closeSheet(); };
  row.appendChild(btn); return row;
}
function villageRow(k){
  const v=VILLAGE[k]; const lock=lockTag(v); const owned=S.village[k]||0;
  const row=el('div','shop-item');
  row.innerHTML=`<span class="emoji">${v.emoji}</span>
    <div class="info"><div class="iname">${v.name} ${owned?'×'+owned:''}</div>
    <div class="idesc">${v.desc}</div></div>`;
  const btn=el('button','buy'+(lock?' lock':''), lock||v.cost+'🪙');
  btn.onclick=()=>{
    if(v.lvl&&S.level<v.lvl)return toast('🔒 Niveau '+v.lvl);
    if(premiumLocked(v))return holderGate(v.name);
    if(S.francs<v.cost)return toast('Pas assez de 🪙');
    addFrancs(-v.cost); S.village[k]=(S.village[k]||0)+1; addXp(8);
    toast(v.name+' ajouté au village !'); save(); UI.renderTop(); UI.openShop('village');
  };
  row.appendChild(btn); return row;
}
function resEmoji(k){
  if(CROPS[k]) return CROPS[k].emoji;
  const map={oeuf:'🥚',lait:'🥛',laine:'🧶',farine:'🌾',pain:'🥖',fromage:'🧀',gateau:'🍰',truffe:'🍫',course:'🏅'};
  return map[k]||'📦';
}
function expandPanel(){
  const wrap=el('div');
  const cur=totalPlots();
  if(!HOLDER && cur>=FREE_MAX_PLOTS){
    wrap.innerHTML='<p class="hint">Mode découverte plafonné à 4×4.<br>Les holders $FRANC débloquent jusqu\'à 6×6.</p>';
    const b=el('button','bigbtn gold','★ Devenir holder $FRANC'); b.onclick=()=>holderGate('Agrandissement'); wrap.appendChild(b);
    return wrap;
  }
  const cost=expandCost();
  wrap.innerHTML=`<p class="hint">Ferme : <b>${S.cols}×${S.rows}</b> (${cur} parcelles)</p>`;
  if(S.cols<6){ const b=el('button','bigbtn','➡️ +1 colonne ('+cost+'🪙)'); b.onclick=()=>{expand('col');UI.openShop('expand');}; wrap.appendChild(b);}  
  if(S.rows<6){ const b=el('button','bigbtn','⬇️ +1 ligne ('+cost+'🪙)'); b.onclick=()=>{expand('row');UI.openShop('expand');}; wrap.appendChild(b);}  
  if(S.cols>=6&&S.rows>=6) wrap.innerHTML+='<p class="hint">🏆 Ferme au maximum !</p>';
  return wrap;
}
function dailyPanel(){
  const wrap=el('div');
  wrap.innerHTML=`<p class="hint">🔥 Série : <b>${S.daily.streak} jour(s)</b></p>`;
  S.daily.tasks.forEach(t=>{
    const row=el('div','quest'+(t.done?' done':''));
    row.innerHTML=`<div><div class="qlabel">${t.label}</div><div class="qprog">${Math.min(t.n,t.goal)}/${t.goal}</div></div>
      <div class="qreward">${t.done?'✓':'+'+t.reward+'🪙'}</div>`;
    wrap.appendChild(row);
  });
  const b=el('button','bigbtn gold','Récupérer les récompenses'); b.onclick=()=>{claimDaily();UI.openShop('daily');};
  wrap.appendChild(b);
  return wrap;
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  if(TG){ try{TG.ready(); TG.expand();}catch(e){} }
  HOLDER=detectHolder();
  if(!load()) S=freshState();
  ensurePlots();
  rollDaily();
  rollWeather();
  UI.renderTop(); UI.renderField(); UI.renderDailyBadge();
  setInterval(tick,1000);
  if(!S.tutorialDone){
    setTimeout(()=>{ toast('Touche une parcelle pour planter 🌱'); S.tutorialDone=true; save(); }, 800);
  }
}
window.addEventListener('load', boot);

</script>
</body>
