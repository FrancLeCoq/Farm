<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#07101f" />
  <meta name="description" content="Francis Perfection — un jeu HTML5 gratuit, prêt pour GitHub Pages et Telegram Web App." />
  <title>Francis Perfection</title>
  <link rel="manifest" href="site.webmanifest" />
  <link rel="icon" href="assets/ui/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/ui/icon-192.png" />
  <link rel="preload" as="image" href="assets/francis/pilot.webp" />
  <link rel="preload" as="image" href="assets/francis/cool.webp" />
  <link rel="stylesheet" href="styles.css" />
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main id="app" aria-label="Francis Perfection">
    <canvas id="game" role="img" aria-label="Jeu Francis Perfection"></canvas>
    <div id="loader" aria-live="polite">
      <div class="loader-card">
        <img src="assets/francis/pilot.webp" alt="Francis le coq pilote" />
        <strong>Francis prépare le poulailler...</strong>
        <span>Chargement des visuels et du moteur de jeu</span>
      </div>
    </div>
    <p id="live" class="sr-only" aria-live="polite"></p>
  </main>
  <noscript>Active JavaScript pour lancer le jeu.</noscript>
  <script src="game.js"></script>
</body>
</html>
