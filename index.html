<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>FrancFarm 3D — La ferme du Coq Francis 🐓</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;overflow:hidden}
body{font-family:'Fredoka',sans-serif;color:#3a2a10;background:#6cb7e0;touch-action:none}
:root{--gold:#FFD700;--gold-d:#caa106;--wood:#b5762f;--wood-d:#7d4f1d;--cream:#fff7e6;--green:#16a34a;--green-d:#15803d;--red:#d23b2c}
#game{position:relative;width:100%;height:100%;max-width:600px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
#cv{flex:1;display:block;width:100%;height:100%;background:linear-gradient(180deg,#aee3f5,#8fd0e8 50%,#6fae53)}

/* top */
#top{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:linear-gradient(180deg,rgba(125,79,29,.96),rgba(125,79,29,.86));box-shadow:0 3px 0 rgba(0,0,0,.2)}
.chip{display:flex;align-items:center;gap:5px;background:var(--cream);border:2px solid var(--wood-d);border-radius:18px;padding:3px 11px;font-weight:600;font-size:15px}
.chip img{width:18px;height:18px}
#levelwrap{flex:1;min-width:0}
#levelline{display:flex;justify-content:space-between;color:var(--cream);font-size:11px;font-weight:600;text-shadow:0 1px 0 rgba(0,0,0,.4)}
#xpbar-bg{height:8px;background:rgba(0,0,0,.3);border-radius:6px;overflow:hidden;margin-top:2px}
#xpbar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#fff0a0);transition:width .4s}
.holderchip{font-family:'Bangers';letter-spacing:1px;font-size:12px;padding:2px 9px;border-radius:14px;border:2px solid}
.holderchip.on{background:var(--gold);color:#3a2a10;border-color:var(--gold-d)}
.holderchip.off{background:rgba(0,0,0,.2);color:var(--cream);border-color:rgba(255,255,255,.3)}

/* mode hint */
#modehint{position:absolute;top:54px;left:50%;transform:translateX(-50%);z-index:9;display:none;
  background:rgba(58,42,16,.9);color:var(--cream);padding:6px 14px;border-radius:18px;font-size:12px;font-weight:600;border:2px solid var(--gold);white-space:nowrap}

/* toolbar (build modes) */
#tools{position:absolute;left:8px;top:96px;z-index:10;display:flex;flex-direction:column;gap:6px}
.tool{width:46px;height:46px;border-radius:12px;border:2px solid var(--wood-d);background:var(--cream);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 var(--wood-d);transition:transform .06s}
.tool:active{transform:translateY(2px);box-shadow:0 1px 0 var(--wood-d)}
.tool.on{background:var(--gold);border-color:var(--gold-d);box-shadow:0 3px 0 var(--gold-d)}

/* bottom */
#bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;display:flex;gap:7px;padding:9px;
  background:linear-gradient(0deg,rgba(125,79,29,.96),rgba(125,79,29,.86));box-shadow:0 -3px 0 rgba(0,0,0,.2)}
.navbtn{flex:1;background:var(--cream);border:2px solid var(--wood-d);border-radius:13px;padding:7px 2px;
  font-family:'Fredoka';font-weight:600;font-size:12px;cursor:pointer;text-align:center;box-shadow:0 3px 0 var(--wood-d)}
.navbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--wood-d)}
.navbtn .ic{display:block;font-size:21px}

/* toast */
#toast{position:absolute;left:50%;bottom:88px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toastmsg{background:rgba(58,42,16,.94);color:var(--cream);padding:8px 15px;border-radius:20px;font-weight:600;font-size:13px;border:2px solid var(--gold);animation:tr 1.7s forwards;text-align:center}
@keyframes tr{0%{opacity:0;transform:translateY(10px)}12%{opacity:1;transform:translateY(0)}82%{opacity:1}100%{opacity:0;transform:translateY(-14px)}}

/* sheet */
#sheet{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
#sheet.show{display:flex}
.sheet-card{width:100%;max-width:600px;max-height:74%;background:#fffaf0;border-radius:22px 22px 0 0;border-top:4px solid var(--wood-d);display:flex;flex-direction:column;animation:su .25s}
@keyframes su{from{transform:translateY(40px)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:linear-gradient(180deg,var(--gold),var(--gold-d));border-radius:18px 18px 0 0}
.sheet-head h2{font-family:'Bangers';letter-spacing:1px;font-size:21px}
.closeX{background:var(--red);color:#fff;border:2px solid #911f15;border-radius:50%;width:30px;height:30px;font-weight:700;cursor:pointer}
#sheet-body{padding:12px;overflow:auto}
.shop-item{display:flex;align-items:center;gap:11px;background:var(--cream);border:2px solid var(--wood);border-radius:13px;padding:9px;margin-bottom:9px}
.shop-item .emoji{font-size:28px}
.shop-item .info{flex:1;min-width:0}
.iname{font-weight:600;font-size:14px}.idesc{font-size:11px;opacity:.72;line-height:1.3}
.buy{background:var(--green);color:#fff;border:2px solid var(--green-d);border-radius:10px;padding:8px 11px;font-family:'Fredoka';font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;box-shadow:0 2px 0 var(--green-d)}
.buy.lock{background:#b6a98c;border-color:#8c7e5e;box-shadow:0 2px 0 #8c7e5e}
.hint{text-align:center;font-size:13px;opacity:.8;margin:6px 0 12px;line-height:1.4}
.bigbtn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Bangers';letter-spacing:1px;font-size:18px;color:#fff;background:linear-gradient(135deg,var(--green),var(--green-d));cursor:pointer;margin-bottom:10px;box-shadow:0 4px 0 var(--green-d)}
.bigbtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#3a2a10;box-shadow:0 4px 0 var(--gold-d)}

/* holder modal */
#holdermodal{position:absolute;inset:0;z-index:70;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:22px}
#holdermodal.show{display:flex}
.holder-card{background:#fffaf0;border:4px solid var(--gold-d);border-radius:20px;max-width:340px;text-align:center;padding:0 0 18px;overflow:hidden;box-shadow:0 8px 0 rgba(0,0,0,.3)}
.holder-card .hh{background:linear-gradient(180deg,var(--gold),var(--gold-d));padding:14px;font-family:'Bangers';font-size:21px;letter-spacing:1px}
.holder-card img{width:110px;margin:14px auto 6px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.holder-card p{padding:0 18px;font-size:14px;line-height:1.5;margin-bottom:14px}
.holder-card b{color:var(--gold-d)}
.holder-btns{display:flex;gap:8px;padding:0 18px}
.holder-btns button{flex:1;padding:11px;border:none;border-radius:12px;font-family:'Fredoka';font-weight:600;cursor:pointer;font-size:13px}
.hb-close{background:#ddd}.hb-go{background:var(--green);color:#fff}
</style>
</head>

const SAVE = 'francfarm_iso_v1';

/* ---- iso constants ---- */
const TW = 128, TH = 64, DEPTH = 18;   // match generated tiles

/* ---- prices ---- */
const PRICE = { land:30, fence:10, plow:15 };
const SEED  = { wheat:5, corn:12, tomato:22, carrot:35 };
const CROP  = {
  wheat:{name:'Blé',  key:'wheat',  time:18, sell:14, c:'#e2c45a'},
  corn: {name:'Maïs', key:'corn',   time:40, sell:34, c:'#f0ce46'},
  tomato:{name:'Tomates',key:'tomato',time:70,sell:64,c:'#d04034'},
  carrot:{name:'Carottes',key:'carrot',time:110,sell:104,c:'#e88c34'},
};
const ANIMAL = {
  cow:  {name:'Vache', cost:500, sprite:'animal_cow',  out:'🥛', sell:60, time:55, need:'pasture'},
  hen:  {name:'Poule', cost:120, sprite:'hen',         out:'🥚', sell:16, time:30, need:'pasture'},
  sheep:{name:'Mouton',cost:300, sprite:'animal_sheep',out:'🧶', sell:38, time:80, need:'pasture'},
  horse:{name:'Cheval',cost:900, sprite:'animal_horse',out:'🏅', sell:140,time:150,need:'pasture'},
};

/* ---- holder gating ---- */
function detectHolder(){
  const u=new URLSearchParams(location.search);
  if(u.get('holder')==='1') return true;
  try{return localStorage.getItem('franc_holder')==='1';}catch(e){return false;}
}
let HOLDER = detectHolder();

/* ============================================================
   STATE
   ============================================================ */
let S;
function fresh(){
  return {
    francs: 600,
    xp:0, level:1,
    size: 6,                 // grid is size x size, expands
    owned: {},               // "x,y" -> true (land bought)
    ground: {},              // "x,y" -> 'grass'|'soil'
    crop: {},                // "x,y" -> {key, at}
    fences: {},              // "x,y,e" e in N,E,S,W -> true
    animals: [],             // {type,x,y,fed,at,px,py,tx,ty}
    inv:{},
    cam:{x:0,y:0,z:1},
    lastTick:Date.now(),
  };
}

/* ---- helpers ---- */
const K=(x,y)=>x+','+y;
const FK=(x,y,e)=>x+','+y+','+e;
function inGrid(x,y){return x>=0&&y>=0&&x<S.size&&y<S.size;}
function owned(x,y){return !!S.owned[K(x,y)];}
function addFrancs(n){S.francs+=n;}
function inv(k){return S.inv[k]||0;}
function addInv(k,n){S.inv[k]=(S.inv[k]||0)+n;}

function save(){try{localStorage.setItem(SAVE,JSON.stringify(S));}catch(e){}}
function load(){try{const r=localStorage.getItem(SAVE);if(r){S=JSON.parse(r);return true;}}catch(e){}return false;}

/* ============================================================
   ISO MATH
   ============================================================ */
function isoToScreen(x,y){
  return { x:(x-y)*(TW/2), y:(x+y)*(TH/2) };
}
function screenToIso(sx,sy){
  const x=(sx/(TW/2)+sy/(TH/2))/2;
  const y=(sy/(TH/2)-sx/(TW/2))/2;
  return { x:Math.floor(x), y:Math.floor(y) };
}

/* ============================================================
   PASTURE DETECTION
   A cell is "enclosed" if you cannot reach the grid border from it
   moving across cell edges that have NO fence (flood fill).
   ============================================================ */
function computeEnclosed(){
  const enclosed={};
  const visited={};
  const stack=[];
  // start flood from all border-adjacent "outside": treat outside ring as open
  // We flood the OPEN region (reachable from outside). Cells NOT reached & owned = enclosed.
  // Build a graph over cells; an edge between (x,y)-(nx,ny) is passable if no fence on shared edge.
  function fenceBetween(x,y,nx,ny){
    if(nx===x+1) return S.fences[FK(x,y,'E')]||S.fences[FK(nx,ny,'W')];
    if(nx===x-1) return S.fences[FK(x,y,'W')]||S.fences[FK(nx,ny,'E')];
    if(ny===y+1) return S.fences[FK(x,y,'S')]||S.fences[FK(nx,ny,'N')];
    if(ny===y-1) return S.fences[FK(x,y,'N')]||S.fences[FK(nx,ny,'S')];
    return false;
  }
  // outside cells: any cell on the border can leak to outside unless fenced on the border edge
  for(let x=0;x<S.size;x++){
    for(let y=0;y<S.size;y++){
      const onBorder = x===0||y===0||x===S.size-1||y===S.size-1;
      if(onBorder){
        // can this border cell reach the outside? border edge has no fence?
        let leaks=false;
        if(x===0 && !S.fences[FK(x,y,'W')]) leaks=true;
        if(y===0 && !S.fences[FK(x,y,'N')]) leaks=true;
        if(x===S.size-1 && !S.fences[FK(x,y,'E')]) leaks=true;
        if(y===S.size-1 && !S.fences[FK(x,y,'S')]) leaks=true;
        if(leaks && !visited[K(x,y)]){ visited[K(x,y)]=true; stack.push([x,y]); }
      }
    }
  }
  while(stack.length){
    const [x,y]=stack.pop();
    const nb=[[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(!inGrid(nx,ny)) continue;
      if(visited[K(nx,ny)]) continue;
      if(fenceBetween(x,y,nx,ny)) continue;
      visited[K(nx,ny)]=true; stack.push([nx,ny]);
    }
  }
  for(let x=0;x<S.size;x++)for(let y=0;y<S.size;y++){
    if(!visited[K(x,y)] && owned(x,y)) enclosed[K(x,y)]=true;
  }
  return enclosed;
}
let ENCLOSED={};
function refreshEnclosed(){ ENCLOSED=computeEnclosed(); }

/* ============================================================
   ACTIONS
   ============================================================ */
function buyLand(x,y){
  if(!inGrid(x,y)) return;
  if(owned(x,y)) return toast('Déjà acheté');
  if(S.francs<PRICE.land) return toast('Pas assez de 🪙 (30)');
  addFrancs(-PRICE.land); S.owned[K(x,y)]=true; S.ground[K(x,y)]='grass';
  refreshEnclosed(); save(); UI.top();
}
function plow(x,y){
  if(!owned(x,y)) return toast('Achète d\'abord ce terrain');
  if(S.ground[K(x,y)]==='soil') return;
  if(S.francs<PRICE.plow) return toast('Pas assez de 🪙 (15)');
  addFrancs(-PRICE.plow); S.ground[K(x,y)]='soil'; save();
}
function toggleFence(x,y,e){
  if(!inGrid(x,y)) return;
  const k=FK(x,y,e);
  if(S.fences[k]){ delete S.fences[k]; refreshEnclosed(); save(); return; }
  if(S.francs<PRICE.fence) return toast('Pas assez de 🪙 (10)');
  addFrancs(-PRICE.fence); S.fences[k]=true; refreshEnclosed(); save(); UI.top();
}
function plant(x,y,key){
  if(S.ground[K(x,y)]!=='soil') return toast('Laboure la parcelle d\'abord');
  if(S.crop[K(x,y)]) return toast('Déjà planté');
  const cost=SEED[key];
  if(S.francs<cost) return toast('Pas assez de 🪙');
  addFrancs(-cost); S.crop[K(x,y)]={key,at:Date.now()}; save();
}
function harvest(x,y){
  const c=S.crop[K(x,y)]; if(!c) return;
  const cr=CROP[c.key];
  if((Date.now()-c.at)/1000<cr.time) return toast('⏳ Pas mûr');
  addFrancs(cr.sell); addXp(3); delete S.crop[K(x,y)];
  FX.float(x,y,'+'+cr.sell); save(); UI.top();
}
function placeAnimal(x,y,type){
  const a=ANIMAL[type];
  if(!ENCLOSED[K(x,y)]) return toast('Place l\'animal dans une pâture close 🚧');
  if(S.francs<a.cost) return toast('Pas assez de 🪙');
  if(premiumLocked(type)) return holderGate(a.name);
  addFrancs(-a.cost);
  const sc=isoToScreen(x+.5,y+.5);
  S.animals.push({type,x,y,fed:false,at:0,px:x+.5,py:y+.5,tx:x+.5,ty:y+.5,mood:1});
  addXp(10); save(); UI.top();
}
function tapAnimal(an){
  const a=ANIMAL[an.type];
  if(an.fed){
    if((Date.now()-an.at)/1000>=a.time){
      addInv(a.out,1); addFrancs(a.sell); an.fed=false; an.at=0;
      FX.float(an.x,an.y,a.out+' +'+a.sell); addXp(4); save(); UI.top();
    } else toast('⏳ Production en cours');
  } else {
    an.fed=true; an.at=Date.now(); toast(a.name+' nourrie 🌾'); save();
  }
}

function premiumLocked(type){
  if(HOLDER) return false;
  return type==='horse'||type==='sheep'; // premium animals
}
function holderGate(name){ UI.holder(name); }

/* ---- expansion ---- */
function expandCost(){ return Math.floor(200*Math.pow(1.4, S.size-6)); }
function expandMap(){
  if(!HOLDER && S.size>=8) return holderGate('Agrandissement');
  if(S.size>=12) return toast('🏆 Map au maximum');
  const c=expandCost();
  if(S.francs<c) return toast('Pas assez de 🪙 ('+c+')');
  addFrancs(-c); S.size+=1; refreshEnclosed(); save(); UI.top(); toast('Terrain agrandi !');
}

/* ---- xp ---- */
function xpNeed(l){return Math.floor(60*Math.pow(l,1.5));}
function addXp(n){S.xp+=n; while(S.xp>=xpNeed(S.level)){S.xp-=xpNeed(S.level);S.level++;FX.levelUp();}}

/* ============================================================
   GAME LOOP (animal roaming + production handled in render)
   ============================================================ */
function tick(){
  const now=Date.now();
  // animals pick a new target inside their pasture occasionally
  for(const an of S.animals){
    if(Math.random()<0.02){
      // wander within same enclosed region: pick neighbor enclosed cell
      const cands=[[an.x,an.y]];
      for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const nx=an.x+dx, ny=an.y+dy;
        if(ENCLOSED[K(nx,ny)]) cands.push([nx,ny]);
      }
      const [tx,ty]=cands[Math.floor(Math.random()*cands.length)];
      an.x=tx; an.y=ty; an.tx=tx+.3+Math.random()*.4; an.ty=ty+.3+Math.random()*.4;
    }
  }
  S.lastTick=now; save();
}
</script>
<script>/* ============================================================
   FrancFarm v2 — Renderer Canvas + UI. Code original.
   ============================================================ */
'use strict';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const IMG = {}; let imgReady=0, imgTotal=0;
function loadImg(key,src){ imgTotal++; const i=new Image(); i.onload=()=>{imgReady++;}; i.src=src; IMG[key]=i; }
for(const k in A) loadImg(k, A[k]);

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function toast(m){const w=$('#toast');const d=el('div','toastmsg',m);w.appendChild(d);setTimeout(()=>d.remove(),1700);}

/* ---- camera ---- */
let cam={x:0,y:0,scale:1};
function resize(){ cv.width=cv.clientWidth*devicePixelRatio; cv.height=cv.clientHeight*devicePixelRatio; }
window.addEventListener('resize',resize);

/* ---- modes ---- */
let MODE='play';            // play | land | plow | fence | plant | animal
let plantKey='wheat', animalKey='cow';
function setMode(m){
  MODE=m; document.querySelectorAll('.tool').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  $('#modehint').textContent = HINT[m]||'';
  $('#modehint').style.display = m==='play'?'none':'block';
}
const HINT={
  land:'🪙 Touche une case pour acheter du terrain (30F)',
  plow:'🚜 Touche un terrain pour le labourer (15F)',
  fence:'🚧 Touche le bord d\'une case pour poser/retirer une clôture (10F)',
  plant:'🌱 Touche une parcelle labourée pour planter',
  animal:'🐄 Touche une pâture close pour y placer l\'animal',
};

/* ============================================================
   FX
   ============================================================ */
const FX={
  items:[],
  float(gx,gy,txt){ const s=isoToScreen(gx+.5,gy+.5); this.items.push({s,txt,t:0}); },
  levelUp(){ toast('🎉 Niveau '+S.level+' !'); },
  draw(){
    for(const f of this.items){ f.t+=1; }
    this.items=this.items.filter(f=>f.t<60);
  }
};

/* ============================================================
   RENDER
   ============================================================ */
function worldOrigin(){
  // center grid in canvas
  return { ox: cv.width/2/devicePixelRatio, oy: 80 };
}
function draw(){
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  const {ox,oy}=worldOrigin();
  ctx.save();
  ctx.translate(ox+cam.x, oy+cam.y);
  ctx.scale(cam.scale,cam.scale);

  const now=Date.now();
  // draw in iso order (back to front): sum x+y ascending
  const cells=[];
  for(let x=0;x<S.size;x++)for(let y=0;y<S.size;y++)cells.push([x,y]);
  cells.sort((a,b)=>(a[0]+a[1])-(b[0]+b[1]));

  // 1) ground tiles
  for(const [x,y] of cells){
    const s=isoToScreen(x,y);
    const isOwned=owned(x,y);
    let key = !isOwned ? null : (S.ground[K(x,y)]==='soil'?'tile_soil':(ENCLOSED[K(x,y)]?'tile_pasture':'tile_grass'));
    if(!isOwned){
      // unowned: faint diamond outline (buyable)
      drawDiamond(s.x,s.y, MODE==='land'?'rgba(255,230,120,.25)':'rgba(255,255,255,.06)','rgba(255,255,255,.18)');
    } else if(IMG[key]&&IMG[key].complete){
      ctx.drawImage(IMG[key], s.x-IMG[key].width/2, s.y-TH/2-6);
    }
  }
  // 2) crops
  for(const [x,y] of cells){
    const c=S.crop[K(x,y)]; if(!c) continue;
    const cr=CROP[c.key]; const e=(now-c.at)/1000; const st=e>=cr.time?2:(e/cr.time>0.5?1:0);
    const key='crop_'+c.key+'_'+st; const s=isoToScreen(x,y);
    if(IMG[key]&&IMG[key].complete) ctx.drawImage(IMG[key], s.x-32, s.y-TH/2-44);
    if(st===2){ // ready marker
      ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(s.x+18,s.y-TH/2-36,7,0,7); ctx.fill();
      ctx.fillStyle='#3a2a10'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('✓',s.x+18,s.y-TH/2-32);
    }
  }
  // 3) fences (draw per cell edges)
  for(const [x,y] of cells){
    const s=isoToScreen(x,y);
    if(S.fences[FK(x,y,'N')]) drawFenceEdge(s,'N');
    if(S.fences[FK(x,y,'E')]) drawFenceEdge(s,'E');
    if(S.fences[FK(x,y,'S')]) drawFenceEdge(s,'S');
    if(S.fences[FK(x,y,'W')]) drawFenceEdge(s,'W');
  }
  // 4) animals
  for(const an of S.animals){
    // lerp toward target
    an.px += (an.tx-an.px)*0.04; an.py += (an.ty-an.py)*0.04;
    const s=isoToScreen(an.px,an.py);
    const a=ANIMAL[an.type];
    const sp=IMG[a.sprite];
    if(sp&&sp.complete){
      const h=58; const w=sp.width*h/sp.height;
      ctx.drawImage(sp, s.x-w/2, s.y-h+6, w, h);
    }
    // mood / ready badge
    const ready=an.fed&&(now-an.at)/1000>=a.time;
    if(!an.fed){ badge(s.x, s.y-58, '🍽️'); }
    else if(ready){ badge(s.x, s.y-58, a.out); }
  }
  // 5) hover highlight in build modes
  if(hover && (MODE==='land'||MODE==='plow'||MODE==='plant'||MODE==='animal')){
    const s=isoToScreen(hover.x,hover.y);
    drawDiamond(s.x,s.y,'rgba(255,230,120,.35)','rgba(255,215,0,.9)');
  }
  if(hover && MODE==='fence' && hoverEdge){
    const s=isoToScreen(hover.x,hover.y); drawFenceEdge(s,hoverEdge,true);
  }
  // 6) float fx
  for(const f of FX.items){
    ctx.globalAlpha=Math.max(0,1-f.t/60);
    ctx.fillStyle='#fff'; ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.lineWidth=3;
    ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
    ctx.strokeText(f.txt,f.s.x,f.s.y-40-f.t*0.6); ctx.fillText(f.txt,f.s.x,f.s.y-40-f.t*0.6);
    ctx.globalAlpha=1;
  }
  FX.draw();
  ctx.restore();
  requestAnimationFrame(draw);
}

function drawDiamond(cx,cy,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(cx,cy-TH/2); ctx.lineTo(cx+TW/2,cy); ctx.lineTo(cx,cy+TH/2); ctx.lineTo(cx-TW/2,cy); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}
function drawFenceEdge(s, edge, preview){
  // edge endpoints of the diamond
  const top={x:s.x,y:s.y-TH/2}, right={x:s.x+TW/2,y:s.y}, bot={x:s.x,y:s.y+TH/2}, left={x:s.x-TW/2,y:s.y};
  let a,b;
  if(edge==='N'){a=left;b=top;} if(edge==='E'){a=top;b=right;}
  if(edge==='S'){a=right;b=bot;} if(edge==='W'){a=bot;b=left;}
  // posts + rails
  ctx.strokeStyle=preview?'rgba(255,215,0,.9)':'#7d4f1d'; ctx.lineWidth=preview?5:6;
  ctx.beginPath(); ctx.moveTo(a.x,a.y-18); ctx.lineTo(b.x,b.y-18); ctx.stroke();
  ctx.strokeStyle=preview?'rgba(255,215,0,.7)':'#a86f3c'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(a.x,a.y-10); ctx.lineTo(b.x,b.y-10); ctx.stroke();
  if(!preview){
    ctx.fillStyle='#7d4f1d';
    for(const p of [a,b]){ ctx.fillRect(p.x-2,p.y-22,4,22); }
  }
}
function badge(x,y,txt){
  ctx.font='18px sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.arc(x,y,13,0,7); ctx.fill();
  ctx.fillText(txt,x,y+6);
}

/* ============================================================
   INPUT (pan, zoom, tap)
   ============================================================ */
let hover=null, hoverEdge=null;
let dragging=false, dragMoved=false, lastP=null, pinchD=0;

function eventToGrid(clientX, clientY){
  const r=cv.getBoundingClientRect();
  const {ox,oy}=worldOrigin();
  let sx=(clientX-r.left-ox-cam.x)/cam.scale;
  let sy=(clientY-r.top-oy-cam.y)/cam.scale;
  return {g:screenToIso(sx,sy), sx, sy};
}
function nearestEdge(sx,sy,gx,gy){
  // which diamond edge is closest to the click point
  const s=isoToScreen(gx,gy);
  const edges={N:[ {x:s.x-TW/2,y:s.y},{x:s.x,y:s.y-TH/2} ],
               E:[ {x:s.x,y:s.y-TH/2},{x:s.x+TW/2,y:s.y} ],
               S:[ {x:s.x+TW/2,y:s.y},{x:s.x,y:s.y+TH/2} ],
               W:[ {x:s.x,y:s.y+TH/2},{x:s.x-TW/2,y:s.y} ]};
  let best=null,bd=1e9;
  for(const e in edges){
    const [a,b]=edges[e]; const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const d=(mx-sx)**2+(my-sy)**2; if(d<bd){bd=d;best=e;}
  }
  return best;
}

function onDown(x,y){ dragging=true; dragMoved=false; lastP={x,y}; }
function onMove(x,y){
  if(dragging && lastP){
    const dx=x-lastP.x, dy=y-lastP.y;
    if(Math.abs(dx)+Math.abs(dy)>4) dragMoved=true;
    cam.x+=dx; cam.y+=dy; lastP={x,y};
  }
  const {g,sx,sy}=eventToGrid(x,y);
  hover = inGrid(g.x,g.y)?g:null;
  if(MODE==='fence' && hover) hoverEdge=nearestEdge(sx,sy,g.x,g.y);
}
function onUp(x,y){
  dragging=false;
  if(dragMoved){ lastP=null; return; }
  const {g,sx,sy}=eventToGrid(x,y);
  if(!inGrid(g.x,g.y)) return;
  handleTap(g.x,g.y,sx,sy);
}
function handleTap(x,y,sx,sy){
  if(MODE==='land') return buyLand(x,y);
  if(MODE==='plow') return plow(x,y);
  if(MODE==='fence'){ const e=nearestEdge(sx,sy,x,y); return toggleFence(x,y,e); }
  if(MODE==='plant') return plant(x,y,plantKey);
  if(MODE==='animal') return placeAnimal(x,y,animalKey);
  // play mode: contextual
  // animal?
  for(const an of S.animals){ if(an.x===x&&an.y===y) return tapAnimal(an); }
  if(S.crop[K(x,y)]) return harvest(x,y);
  if(!owned(x,y)){ toast('Terrain libre — passe en mode 🪙 pour l\'acheter'); }
}

// mouse
cv.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
cv.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('mouseup',e=>onUp(e.clientX,e.clientY));
cv.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;cam.scale=Math.max(0.5,Math.min(2.2,cam.scale*f));},{passive:false});
// touch
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1) onDown(e.touches[0].clientX,e.touches[0].clientY);
  else if(e.touches.length===2){ pinchD=touchDist(e); }
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1) onMove(e.touches[0].clientX,e.touches[0].clientY);
  else if(e.touches.length===2){ const d=touchDist(e); if(pinchD){cam.scale=Math.max(0.5,Math.min(2.2,cam.scale*d/pinchD));} pinchD=d; }
},{passive:false});
cv.addEventListener('touchend',e=>{ if(e.changedTouches.length) onUp(e.changedTouches[0].clientX,e.changedTouches[0].clientY); },{passive:false});
function touchDist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

/* ============================================================
   UI / HUD
   ============================================================ */
const UI={
  top(){
    $('#francs').textContent=Math.floor(S.francs);
    $('#leveltxt').textContent='Niv. '+S.level;
    $('#xpbar').style.width=Math.min(100,(S.xp/xpNeed(S.level))*100)+'%';
    $('#holderchip').textContent=HOLDER?'★ Holder $FRANC':'Découverte';
    $('#holderchip').className='holderchip '+(HOLDER?'on':'off');
  },
  openShop(kind){
    $('#sheet').classList.add('show'); const b=$('#sheet-body'); b.innerHTML='';
    if(kind==='plant'){
      $('#sheet-title').textContent='Graines 🌱';
      for(const k in CROP){ const c=CROP[k];
        const row=el('div','shop-item',`<span class="emoji">🌱</span><div class="info"><div class="iname">${c.name}</div><div class="idesc">${SEED[k]}🪙 → ${c.sell}🪙 · ${c.time}s</div></div>`);
        const btn=el('button','buy', SEED[k]+'🪙'); btn.onclick=()=>{plantKey=k;setMode('plant');UI.closeSheet();toast('Plante : '+c.name);};
        row.appendChild(btn); b.appendChild(row);
      }
    } else if(kind==='animal'){
      $('#sheet-title').textContent='Animaux 🐄';
      for(const k in ANIMAL){ const a=ANIMAL[k]; const lock=premiumLocked(k);
        const row=el('div','shop-item',`<span class="emoji">${a.out}</span><div class="info"><div class="iname">${a.name}</div><div class="idesc">${a.cost}🪙 · produit ${a.out} (+${a.sell}🪙/${a.time}s)</div></div>`);
        const btn=el('button','buy'+(lock?' lock':''), lock?'★ Holder':a.cost+'🪙');
        btn.onclick=()=>{ if(lock)return holderGate(a.name); animalKey=k;setMode('animal');UI.closeSheet();toast('Place : '+a.name);};
        row.appendChild(btn); b.appendChild(row);
      }
    } else if(kind==='expand'){
      $('#sheet-title').textContent='Agrandir le terrain ⛏️';
      const wrap=el('div'); 
      if(!HOLDER && S.size>=8){ wrap.innerHTML='<p class="hint">Découverte plafonnée à 8×8.<br>Les holders $FRANC vont jusqu\'à 12×12.</p>';
        const g=el('button','bigbtn gold','★ Devenir holder $FRANC'); g.onclick=()=>holderGate('Agrandissement'); wrap.appendChild(g);
      } else if(S.size>=12){ wrap.innerHTML='<p class="hint">🏆 Terrain au maximum (12×12) !</p>'; }
      else { wrap.innerHTML=`<p class="hint">Terrain actuel : <b>${S.size}×${S.size}</b></p>`;
        const g=el('button','bigbtn','Agrandir (+1) — '+expandCost()+'🪙'); g.onclick=()=>{expandMap();UI.openShop('expand');}; wrap.appendChild(g);
      }
      b.appendChild(wrap);
    }
  },
  closeSheet(){ $('#sheet').classList.remove('show'); },
  holder(name){ $('#holdermodal').classList.add('show'); $('#holder-feature').textContent=name; },
  closeHolder(){ $('#holdermodal').classList.remove('show'); },
};

/* ============================================================
   BOOT
   ============================================================ */
function centerCam(){
  // center on grid middle
  const mid=isoToScreen(S.size/2,S.size/2);
  cam.x=-mid.x*cam.scale; cam.y=0;
}
function boot(){
  if(TG){try{TG.ready();TG.expand();}catch(e){}}
  HOLDER=detectHolder();
  if(!load()) S=fresh();
  resize();
  refreshEnclosed();
  centerCam();
  UI.top(); setMode('play');
  setInterval(tick,1000);
  requestAnimationFrame(draw);
  if(Object.keys(S.owned).length===0){
    setTimeout(()=>toast('Commence par acheter du terrain 🪙'),700);
  }
}
window.addEventListener('load',boot);
</script>
</body>
</html>
